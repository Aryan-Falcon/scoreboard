<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA SCOREBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #03040f;
  --panel: rgba(10,15,40,0.85);
  --accent: #00e5ff;
  --accent2: #ff3cac;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --glow: 0 0 20px rgba(0,229,255,0.5);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── CANVAS BACKGROUND ── */
#bgCanvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

/* ── EFFECT CANVAS (asteroids, explosions) ── */
#fxCanvas {
  position: fixed;
  inset: 0;
  z-index: 10;
  pointer-events: none;
}

/* ── HEADER ── */
header {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 28px 20px 10px;
}

header h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.8em, 4vw, 3.2em);
  font-weight: 900;
  letter-spacing: 0.12em;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 18px rgba(0,229,255,0.7));
}

.subtitle {
  font-family: 'Orbitron', monospace;
  font-size: 0.75em;
  letter-spacing: 0.4em;
  color: rgba(0,229,255,0.5);
  margin-top: 4px;
}

/* ── CONTROLS PANEL ── */
#controlPanel {
  position: relative;
  z-index: 5;
  background: var(--panel);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 16px;
  padding: 20px;
  max-width: 900px;
  margin: 16px auto;
  backdrop-filter: blur(20px);
  box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.05);
}

.panel-title {
  font-family: 'Orbitron', monospace;
  font-size: 0.7em;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-bottom: 14px;
  text-transform: uppercase;
}

.controls-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
  gap: 10px;
  align-items: end;
}

.ctrl-group {
  display: flex;
  flex-direction: column;
  gap: 5px;
}

.ctrl-group label {
  font-size: 0.72em;
  letter-spacing: 0.15em;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
}

input[type="text"], input[type="number"], select {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 8px;
  color: white;
  padding: 9px 12px;
  font-family: 'Rajdhani', sans-serif;
  font-size: 1em;
  font-weight: 500;
  width: 100%;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,229,255,0.15);
}
select option { background: #0a0f2c; }

input[type="color"] {
  width: 48px;
  height: 40px;
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 8px;
  padding: 2px;
  background: rgba(0,0,0,0.4);
  cursor: pointer;
}

/* ── BUTTONS ── */
.btn {
  font-family: 'Orbitron', monospace;
  font-size: 0.7em;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 10px 16px;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.btn::after {
  content: '';
  position: absolute;
  inset: 0;
  background: white;
  opacity: 0;
  transition: opacity 0.15s;
}
.btn:active::after { opacity: 0.15; }

.btn-primary {
  background: linear-gradient(135deg, #0066ff, var(--accent));
  color: white;
  box-shadow: 0 4px 20px rgba(0,229,255,0.3);
}
.btn-primary:hover { box-shadow: 0 4px 30px rgba(0,229,255,0.6); transform: translateY(-1px); }

.btn-start {
  background: linear-gradient(135deg, #00c853, #69f0ae);
  color: #002010;
  box-shadow: 0 4px 20px rgba(0,200,83,0.35);
}
.btn-start:hover { box-shadow: 0 4px 30px rgba(0,200,83,0.6); transform: translateY(-1px); }

.btn-end {
  background: linear-gradient(135deg, #ff1744, #ff6090);
  color: white;
  box-shadow: 0 4px 20px rgba(255,23,68,0.3);
}
.btn-end:hover { box-shadow: 0 4px 30px rgba(255,23,68,0.6); transform: translateY(-1px); }

.btn-danger {
  background: rgba(255,50,50,0.15);
  border: 1px solid rgba(255,50,50,0.3);
  color: #ff6060;
  font-size: 0.65em;
  padding: 5px 8px;
}
.btn-danger:hover { background: rgba(255,50,50,0.3); }

.btn-score {
  width: 40px; height: 40px;
  border-radius: 50%;
  font-size: 1.1em;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  display: flex; align-items: center; justify-content: center;
  padding: 0;
  letter-spacing: 0;
}
.btn-plus {
  background: linear-gradient(135deg, #00c853, #69f0ae);
  color: #002010;
  box-shadow: 0 2px 12px rgba(0,200,83,0.4);
}
.btn-plus:hover { box-shadow: 0 2px 20px rgba(0,200,83,0.7); transform: scale(1.08); }
.btn-minus {
  background: linear-gradient(135deg, #ff1744, #ff6090);
  color: white;
  box-shadow: 0 2px 12px rgba(255,23,68,0.4);
}
.btn-minus:hover { box-shadow: 0 2px 20px rgba(255,23,68,0.7); transform: scale(1.08); }

/* ── GAME AREA ── */
#gameArea {
  position: relative;
  z-index: 5;
  display: flex;
  justify-content: center;
  align-items: flex-end;
  flex-wrap: wrap;
  gap: clamp(16px, 3vw, 40px);
  padding: 20px clamp(10px, 3vw, 40px) 40px;
  min-height: 480px;
}

/* ── PLAYER COLUMN ── */
.playerColumn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  position: relative;
}

.player-card {
  background: var(--panel);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 14px;
  padding: 12px 14px;
  text-align: center;
  width: 150px;
  backdrop-filter: blur(10px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.player-card.leading {
  border-color: rgba(255,215,0,0.5);
  box-shadow: 0 0 24px rgba(255,215,0,0.25);
}

.player-name {
  font-family: 'Orbitron', monospace;
  font-size: 0.82em;
  font-weight: 700;
  letter-spacing: 0.08em;
  color: white;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.player-score-display {
  font-family: 'Orbitron', monospace;
  font-size: 1.6em;
  font-weight: 900;
  line-height: 1;
  margin: 4px 0;
}

.player-rank {
  font-size: 0.65em;
  letter-spacing: 0.2em;
  color: rgba(255,255,255,0.35);
  text-transform: uppercase;
}

/* ── LAUNCH TRACK ── */
.track-wrapper {
  position: relative;
  width: 70px;
}

.track {
  width: 70px;
  height: 340px;
  background: linear-gradient(to top, #050812 0%, #0c1230 100%);
  border-radius: 35px;
  position: relative;
  overflow: hidden;
  border: 1px solid rgba(0,229,255,0.12);
  box-shadow: inset 0 0 30px rgba(0,0,0,0.8);
}

/* Tick marks */
.track::before {
  content: '';
  position: absolute;
  inset: 0;
  background-image: repeating-linear-gradient(
    to top,
    transparent 0px,
    transparent 27px,
    rgba(0,229,255,0.07) 27px,
    rgba(0,229,255,0.07) 28px
  );
  border-radius: 35px;
}

.track-fill {
  position: absolute;
  bottom: 0;
  left: 0;
  right: 0;
  background: linear-gradient(to top, rgba(0,229,255,0.15), transparent);
  border-radius: 35px;
  transition: height 0.6s cubic-bezier(0.34,1.56,0.64,1);
}

/* ── SVG ROCKET ── */
.rocket-wrap {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  bottom: 10px;
  width: 38px;
  transition: bottom 0.6s cubic-bezier(0.34,1.56,0.64,1);
  filter: drop-shadow(0 0 6px currentColor);
}

.rocket-wrap.shaking {
  animation: shake 0.5s ease;
}
@keyframes shake {
  0%,100%{transform:translateX(-50%) rotate(0deg);}
  15%{transform:translateX(calc(-50% + 4px)) rotate(6deg);}
  30%{transform:translateX(calc(-50% - 4px)) rotate(-6deg);}
  45%{transform:translateX(calc(-50% + 3px)) rotate(4deg);}
  60%{transform:translateX(calc(-50% - 3px)) rotate(-4deg);}
  75%{transform:translateX(calc(-50% + 1px)) rotate(2deg);}
}

.rocket-thruster {
  animation: thruster 0.12s infinite alternate;
  transform-origin: top center;
}
@keyframes thruster {
  from { transform: scaleY(1) scaleX(1); opacity: 0.9; }
  to   { transform: scaleY(1.4) scaleX(0.7); opacity: 1; }
}

/* ── SCORE CONTROLS ── */
.score-controls {
  display: flex;
  align-items: center;
  gap: 8px;
}

.custom-score-wrap {
  display: flex;
  gap: 5px;
  align-items: center;
  width: 150px;
}
.custom-score-wrap input {
  width: 65px;
  padding: 7px 8px;
  font-size: 0.9em;
}
.custom-score-wrap .btn {
  flex-shrink: 0;
  padding: 7px 10px;
  font-size: 0.6em;
}

/* ── STATUS BAR ── */
#statusBar {
  position: relative;
  z-index: 5;
  text-align: center;
  padding: 8px;
  font-family: 'Orbitron', monospace;
  font-size: 0.75em;
  letter-spacing: 0.2em;
  color: rgba(0,229,255,0.6);
  min-height: 32px;
}

#timer {
  font-size: 1.4em;
  color: var(--accent);
  font-weight: 700;
}

/* ── RESULTS OVERLAY ── */
#results {
  position: fixed;
  inset: 0;
  background: rgba(0,0,10,0.97);
  display: none;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  z-index: 200;
  gap: 30px;
}

.results-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.4em, 4vw, 2.8em);
  font-weight: 900;
  letter-spacing: 0.1em;
  background: linear-gradient(90deg, #ffd700, #ff8c00, #ffd700);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  animation: shimmer 2s linear infinite;
  background-size: 200%;
  filter: drop-shadow(0 0 20px rgba(255,215,0,0.6));
}
@keyframes shimmer { to { background-position: 200% center; } }

.podium-wrap {
  display: flex;
  align-items: flex-end;
  gap: 10px;
}

.podium-step {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
}

.podium-name {
  font-family: 'Orbitron', monospace;
  font-size: 0.75em;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-align: center;
  max-width: 100px;
  word-break: break-word;
}

.podium-block {
  width: 110px;
  border-radius: 10px 10px 0 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: flex-end;
  padding: 12px 8px;
  font-family: 'Orbitron', monospace;
  font-weight: 900;
  animation: podiumRise 0.9s cubic-bezier(0.34,1.4,0.64,1) forwards;
  transform: translateY(300px);
}

.podium-medal {
  font-size: 2em;
  margin-bottom: 4px;
}
.podium-score-text {
  font-size: 1.3em;
}
.podium-place {
  font-size: 0.65em;
  opacity: 0.7;
  letter-spacing: 0.2em;
}

.podium-gold .podium-block { background: linear-gradient(to top, #b8860b, #ffd700); height: 200px; color: #3d2500; animation-delay: 0.1s; }
.podium-silver .podium-block { background: linear-gradient(to top, #888, #ddd); height: 160px; color: #1a1a1a; animation-delay: 0.25s; }
.podium-bronze .podium-block { background: linear-gradient(to top, #7a4010, #cd7f32); height: 130px; color: #2a1000; animation-delay: 0.4s; }

@keyframes podiumRise {
  to { transform: translateY(0); }
}

.results-scores {
  display: flex;
  flex-direction: column;
  gap: 5px;
  max-height: 200px;
  overflow-y: auto;
  text-align: center;
}
.result-row {
  font-family: 'Orbitron', monospace;
  font-size: 0.75em;
  color: rgba(255,255,255,0.6);
  letter-spacing: 0.1em;
}

/* ── NOTIFICATION TOAST ── */
.toast {
  position: fixed;
  top: 20px;
  right: 20px;
  z-index: 300;
  background: var(--panel);
  border: 1px solid rgba(0,229,255,0.3);
  border-radius: 10px;
  padding: 10px 18px;
  font-family: 'Orbitron', monospace;
  font-size: 0.75em;
  letter-spacing: 0.1em;
  backdrop-filter: blur(20px);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 1.8s forwards;
  pointer-events: none;
}
@keyframes toastIn { from { opacity:0; transform:translateX(40px); } to { opacity:1; transform:translateX(0); } }
@keyframes toastOut { to { opacity:0; transform:translateX(40px); } }

/* ── ASTEROID WARNING FLASH ── */
.asteroid-flash {
  position: fixed;
  inset: 0;
  background: radial-gradient(circle, rgba(255,80,0,0.25) 0%, transparent 70%);
  z-index: 9;
  pointer-events: none;
  animation: flashFade 0.5s ease forwards;
}
@keyframes flashFade { to { opacity: 0; } }

</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="fxCanvas"></canvas>

<header>
  <h1>✦ NOVA SCOREBOARD ✦</h1>
  <div class="subtitle">DEEP SPACE COMPETITION SYSTEM</div>
</header>

<div id="controlPanel">
  <div class="panel-title">⬡ Mission Configuration</div>
  <div class="controls-grid">
    <div class="ctrl-group">
      <label>Mode</label>
      <select id="mode">
        <option value="score">Score to Win</option>
        <option value="time">Timed Game</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Target Score / Seconds</label>
      <input type="number" id="targetValue" placeholder="e.g. 10 or 60" value="10">
    </div>
    <div class="ctrl-group">
      <label>Player Name</label>
      <input type="text" id="playerNameInput" placeholder="Call sign...">
    </div>
    <div class="ctrl-group">
      <label>Ship Color</label>
      <input type="color" id="playerColor" value="#00e5ff">
    </div>
    <div class="ctrl-group">
      <label>Ship Shape</label>
      <select id="shipShape">
        <option value="classic">Classic</option>
        <option value="delta">Delta Wing</option>
        <option value="needle">Needle</option>
        <option value="disc">UFO Disc</option>
      </select>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <button class="btn btn-primary" onclick="addPlayer()">＋ Add Pilot</button>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <button class="btn btn-start" onclick="startGame()">▶ Launch</button>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <button class="btn btn-end" onclick="endGame()">■ End Game</button>
    </div>
  </div>
</div>

<div id="statusBar">AWAITING LAUNCH</div>

<div id="gameArea"></div>

<div id="results">
  <div class="results-title" id="winnerText"></div>
  <div class="podium-wrap" id="podium"></div>
  <div class="results-scores" id="allScores"></div>
  <button class="btn btn-primary" onclick="location.reload()" style="margin-top:10px">↺ PLAY AGAIN</button>
</div>

<script>
/* ────────────────────────────────────────────
   BACKGROUND STARFIELD
──────────────────────────────────────────── */
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');

let stars = [];
function initStars() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 280; i++) {
    stars.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.4 + 0.2,
      speed: Math.random() * 0.25 + 0.05,
      alpha: Math.random() * 0.7 + 0.3,
      twinkle: Math.random() * Math.PI * 2
    });
  }
}
function drawStars() {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);
  const t = performance.now() / 1000;
  for (const s of stars) {
    s.twinkle += 0.015;
    const a = s.alpha * (0.7 + 0.3 * Math.sin(s.twinkle));
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    bgCtx.fillStyle = `rgba(200,230,255,${a})`;
    bgCtx.fill();
    s.y += s.speed;
    if (s.y > bgCanvas.height) { s.y = 0; s.x = Math.random() * bgCanvas.width; }
  }
  requestAnimationFrame(drawStars);
}
initStars(); drawStars();
window.addEventListener('resize', initStars);

/* ────────────────────────────────────────────
   FX CANVAS (asteroids, explosions, particles)
──────────────────────────────────────────── */
const fxCanvas = document.getElementById('fxCanvas');
const fx = fxCanvas.getContext('2d');
let fxObjects = [];

function resizeFx() {
  fxCanvas.width = window.innerWidth;
  fxCanvas.height = window.innerHeight;
}
resizeFx();
window.addEventListener('resize', resizeFx);

function animateFx() {
  fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  fxObjects = fxObjects.filter(o => o.alive);
  for (const o of fxObjects) o.update();
  requestAnimationFrame(animateFx);
}
animateFx();

/* ── Asteroid ── */
class Asteroid {
  constructor(targetEl, onHit) {
    this.alive = true;
    this.onHit = onHit;
    const rect = targetEl.getBoundingClientRect();
    this.tx = rect.left + rect.width / 2;
    this.ty = rect.top + rect.height / 2;
    // spawn from random edge
    const edge = Math.random();
    if (edge < 0.5) {
      this.x = edge < 0.25 ? -80 : fxCanvas.width + 80;
      this.y = Math.random() * fxCanvas.height;
    } else {
      this.x = Math.random() * fxCanvas.width;
      this.y = edge < 0.75 ? -80 : fxCanvas.height + 80;
    }
    const dx = this.tx - this.x, dy = this.ty - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const spd = 5 + Math.random() * 3;
    this.vx = dx/dist*spd;
    this.vy = dy/dist*spd;
    this.r = 22 + Math.random() * 12;
    this.rot = Math.random() * Math.PI * 2;
    this.rotSpd = (Math.random() - 0.5) * 0.08;
    this.points = this.genPoints();
    this.hit = false;
    this.color = `hsl(${20 + Math.random()*30},60%,45%)`;
  }
  genPoints() {
    const pts = [];
    const n = 9 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2;
      const r = this.r * (0.65 + Math.random() * 0.4);
      pts.push([Math.cos(a)*r, Math.sin(a)*r]);
    }
    return pts;
  }
  update() {
    if (this.hit) return;
    this.x += this.vx;
    this.y += this.vy;
    this.rot += this.rotSpd;
    const dx = this.tx - this.x, dy = this.ty - this.y;
    if (Math.sqrt(dx*dx+dy*dy) < this.r + 20) {
      this.hit = true;
      this.alive = false;
      this.onHit();
      spawnExplosion(this.x, this.y, this.color);
      flashScreen();
    }
    this.draw();
  }
  draw() {
    fx.save();
    fx.translate(this.x, this.y);
    fx.rotate(this.rot);
    // glow
    fx.shadowBlur = 16;
    fx.shadowColor = 'rgba(255,120,30,0.7)';
    fx.beginPath();
    this.points.forEach(([px, py], i) =>
      i ? fx.lineTo(px, py) : fx.moveTo(px, py)
    );
    fx.closePath();
    const grad = fx.createRadialGradient(0,0,0,0,0,this.r);
    grad.addColorStop(0, '#fff3cc');
    grad.addColorStop(0.4, this.color);
    grad.addColorStop(1, '#2a1200');
    fx.fillStyle = grad;
    fx.fill();
    fx.strokeStyle = 'rgba(255,200,100,0.4)';
    fx.lineWidth = 1.5;
    fx.stroke();
    // craters
    fx.shadowBlur = 0;
    for (let i = 0; i < 3; i++) {
      fx.beginPath();
      fx.arc((i-1)*this.r*0.3, (i*0.2-0.2)*this.r*0.5, this.r*0.12, 0, Math.PI*2);
      fx.fillStyle = 'rgba(0,0,0,0.3)';
      fx.fill();
    }
    fx.restore();
  }
}

/* ── Explosion ── */
function spawnExplosion(x, y, color) {
  for (let i = 0; i < 50; i++) {
    fxObjects.push(new Particle(x, y, color, 'explosion'));
  }
  for (let i = 0; i < 8; i++) {
    fxObjects.push(new Particle(x, y, '#fff', 'debris'));
  }
}

/* ── Boost Particles (on +score) ── */
function spawnBoost(x, y, color) {
  for (let i = 0; i < 20; i++) {
    fxObjects.push(new Particle(x, y, color, 'boost'));
  }
}

class Particle {
  constructor(x, y, color, type) {
    this.alive = true;
    this.x = x; this.y = y;
    this.color = color;
    this.type = type;
    const a = Math.random() * Math.PI * 2;
    if (type === 'explosion') {
      const spd = 2 + Math.random() * 6;
      this.vx = Math.cos(a) * spd;
      this.vy = Math.sin(a) * spd;
      this.r = 2 + Math.random() * 4;
      this.life = 1.0;
      this.decay = 0.025 + Math.random() * 0.025;
    } else if (type === 'debris') {
      const spd = 3 + Math.random() * 8;
      this.vx = Math.cos(a) * spd;
      this.vy = Math.sin(a) * spd;
      this.r = 3 + Math.random() * 5;
      this.life = 1.0;
      this.decay = 0.018 + Math.random() * 0.015;
    } else { // boost
      const spd = 1 + Math.random() * 3;
      this.vx = Math.cos(a) * spd;
      this.vy = -Math.abs(Math.sin(a)) * spd - 1;
      this.r = 1.5 + Math.random() * 3;
      this.life = 1.0;
      this.decay = 0.03 + Math.random() * 0.02;
    }
  }
  update() {
    this.x += this.vx;
    this.y += this.vy;
    this.vy += 0.1;
    this.life -= this.decay;
    if (this.life <= 0) { this.alive = false; return; }
    fx.beginPath();
    fx.arc(this.x, this.y, this.r * this.life, 0, Math.PI * 2);
    const hue = this.type === 'explosion' ? `rgba(255,${Math.floor(this.life*180)},0,${this.life})` :
                this.type === 'debris'    ? `rgba(255,240,200,${this.life})` :
                                            this.color + Math.floor(this.life * 255).toString(16).padStart(2,'0');
    fx.fillStyle = hue;
    fx.shadowBlur = 6; fx.shadowColor = this.color;
    fx.fill();
    fx.shadowBlur = 0;
  }
}

/* ── Meteor (from right edge) ── */
class Meteor {
  constructor() {
    this.alive = true;
    this.x = fxCanvas.width + 80;
    this.y = Math.random() * fxCanvas.height * 0.6;
    this.vx = -(4 + Math.random() * 5);
    this.vy = (2 + Math.random() * 3);
    this.len = 60 + Math.random() * 80;
    this.life = 1.0;
    this.decay = 0.008 + Math.random() * 0.008;
  }
  update() {
    this.x += this.vx; this.y += this.vy;
    this.life -= this.decay;
    if (this.life <= 0 || this.x < -200 || this.y > fxCanvas.height + 100) {
      this.alive = false; return;
    }
    fx.save();
    const angle = Math.atan2(this.vy, this.vx);
    fx.translate(this.x, this.y);
    fx.rotate(angle);
    const g = fx.createLinearGradient(0, 0, -this.len, 0);
    g.addColorStop(0, `rgba(255,255,240,${this.life})`);
    g.addColorStop(0.3, `rgba(255,180,60,${this.life*0.7})`);
    g.addColorStop(1, 'transparent');
    fx.strokeStyle = g;
    fx.lineWidth = 2 * this.life;
    fx.shadowBlur = 8 * this.life;
    fx.shadowColor = 'rgba(255,200,80,0.8)';
    fx.beginPath();
    fx.moveTo(0, 0); fx.lineTo(-this.len, 0);
    fx.stroke();
    fx.restore();
  }
}

/* ── Screen Flash ── */
function flashScreen() {
  const el = document.createElement('div');
  el.className = 'asteroid-flash';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 500);
}

/* ────────────────────────────────────────────
   GAME STATE
──────────────────────────────────────────── */
let players = [];
let gameStarted = false;
let meteorSpawnInterval = null;
let timerInterval = null;
let timeLeft = 0;

function addPlayer() {
  const nameEl = document.getElementById('playerNameInput');
  const colorEl = document.getElementById('playerColor');
  const shapeEl = document.getElementById('shipShape');
  const name = nameEl.value.trim();
  if (!name) { toast('Enter a pilot name!'); return; }
  if (players.length >= 8) { toast('Max 8 pilots!'); return; }

  players.push({ name, score: 0, color: colorEl.value, shape: shapeEl.value });
  nameEl.value = '';
  renderPlayers();
  toast(`${name} joined the mission`);
}

function renderPlayers() {
  const area = document.getElementById('gameArea');
  area.innerHTML = '';

  const maxScore = Math.max(...players.map(p => p.score), 0);

  players.forEach((p, i) => {
    const col = document.createElement('div');
    col.className = 'playerColumn';
    col.id = `col${i}`;

    const rank = [...players].sort((a,b) => b.score - a.score).findIndex(x => x === p) + 1;
    const isLeading = p.score === maxScore && p.score > 0 && players.length > 1;
    const rankLabels = ['1ST','2ND','3RD','4TH','5TH','6TH','7TH','8TH'];

    col.innerHTML = `
      <div class="player-card${isLeading ? ' leading' : ''}" id="card${i}">
        <div class="player-name">${escHtml(p.name)}</div>
        <div class="player-score-display" style="color:${p.color}" id="scoreDisp${i}">${p.score}</div>
        <div class="player-rank">${rankLabels[rank-1] || ''}</div>
      </div>

      <div class="track-wrapper">
        <div class="track" id="track${i}">
          <div class="track-fill" id="fill${i}" style="height:0%"></div>
          <div class="rocket-wrap" id="rocket${i}" style="bottom:10px">
            ${buildRocketSVG(p.color, p.shape)}
          </div>
        </div>
      </div>

      <div class="score-controls">
        <button class="btn btn-score btn-plus" onclick="changeScore(${i},1)">+</button>
        <button class="btn btn-score btn-minus" onclick="changeScore(${i},-1)">−</button>
      </div>

      <div class="custom-score-wrap">
        <input type="number" id="custom${i}" placeholder="±pts">
        <button class="btn btn-primary" onclick="applyCustom(${i})">SET</button>
        <button class="btn btn-danger" onclick="removePlayer(${i})">✕</button>
      </div>
    `;
    area.appendChild(col);
  });

  // Update visual positions
  players.forEach((p, i) => updateRocketVisual(i, false));
}

function buildRocketSVG(color, shape) {
  const s = shape || 'classic';
  if (s === 'classic') return `
    <svg viewBox="0 0 38 70" xmlns="http://www.w3.org/2000/svg" width="38" height="70">
      <ellipse cx="19" cy="32" rx="11" ry="22" fill="${color}" opacity="0.9"/>
      <ellipse cx="19" cy="14" rx="7" ry="12" fill="${lighten(color)}"/>
      <circle cx="19" cy="26" r="5" fill="rgba(200,240,255,0.85)" stroke="rgba(255,255,255,0.4)" stroke-width="1"/>
      <polygon points="8,42 2,58 19,50" fill="${color}" opacity="0.8"/>
      <polygon points="30,42 36,58 19,50" fill="${color}" opacity="0.8"/>
      <ellipse class="rocket-thruster" cx="19" cy="56" rx="6" ry="10" fill="url(#flame_${color.slice(1)})"/>
      <defs>
        <radialGradient id="flame_${color.slice(1)}" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#fff" stop-opacity="1"/>
          <stop offset="40%" stop-color="#ffa040" stop-opacity="1"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>`;
  if (s === 'delta') return `
    <svg viewBox="0 0 50 70" xmlns="http://www.w3.org/2000/svg" width="38" height="70">
      <polygon points="25,0 5,65 25,55 45,65" fill="${color}" opacity="0.9"/>
      <polygon points="25,8 12,60 25,52 38,60" fill="${lighten(color)}" opacity="0.5"/>
      <circle cx="25" cy="28" r="5" fill="rgba(200,240,255,0.9)"/>
      <ellipse class="rocket-thruster" cx="25" cy="65" rx="7" ry="10" fill="url(#flameDelta_${color.slice(1)})"/>
      <defs>
        <radialGradient id="flameDelta_${color.slice(1)}" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#fff"/>
          <stop offset="40%" stop-color="#ffa040"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>`;
  if (s === 'needle') return `
    <svg viewBox="0 0 22 80" xmlns="http://www.w3.org/2000/svg" width="22" height="80">
      <rect x="8" y="10" width="6" height="55" rx="3" fill="${color}"/>
      <polygon points="11,0 5,18 17,18" fill="${lighten(color)}"/>
      <rect x="2" y="40" width="18" height="8" rx="2" fill="${color}" opacity="0.7"/>
      <circle cx="11" cy="25" r="3.5" fill="rgba(200,240,255,0.9)"/>
      <ellipse class="rocket-thruster" cx="11" cy="68" rx="5" ry="9" fill="url(#flameNeedle_${color.slice(1)})"/>
      <defs>
        <radialGradient id="flameNeedle_${color.slice(1)}" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#fff"/>
          <stop offset="40%" stop-color="#ffa040"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>`;
  if (s === 'disc') return `
    <svg viewBox="0 0 60 40" xmlns="http://www.w3.org/2000/svg" width="50" height="40">
      <ellipse cx="30" cy="28" rx="28" ry="10" fill="${color}" opacity="0.85"/>
      <ellipse cx="30" cy="22" rx="16" ry="14" fill="${color}"/>
      <ellipse cx="30" cy="18" rx="10" ry="8" fill="${lighten(color)}" opacity="0.7"/>
      <circle cx="30" cy="16" r="5" fill="rgba(200,240,255,0.95)"/>
      <ellipse class="rocket-thruster" cx="30" cy="36" rx="10" ry="7" fill="url(#flameDisc_${color.slice(1)})"/>
      <defs>
        <radialGradient id="flameDisc_${color.slice(1)}" cx="50%" cy="30%" r="70%">
          <stop offset="0%" stop-color="#fff"/>
          <stop offset="40%" stop-color="#60aaff"/>
          <stop offset="100%" stop-color="transparent" stop-opacity="0"/>
        </radialGradient>
      </defs>
    </svg>`;
  return '';
}

function lighten(hex) {
  let r = parseInt(hex.slice(1,3),16);
  let g = parseInt(hex.slice(3,5),16);
  let b = parseInt(hex.slice(5,7),16);
  r = Math.min(255, r + 80); g = Math.min(255, g + 80); b = Math.min(255, b + 80);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function updateRocketVisual(i, animate = true) {
  const p = players[i];
  const target = parseFloat(document.getElementById('targetValue').value) || 10;
  let pct = p.score / target;
  pct = Math.max(0, Math.min(pct, 1));

  const rocketEl = document.getElementById(`rocket${i}`);
  const fillEl = document.getElementById(`fill${i}`);
  const scoreEl = document.getElementById(`scoreDisp${i}`);
  const cardEl = document.getElementById(`card${i}`);
  if (!rocketEl || !fillEl || !scoreEl) return;

  const TRACK_HEIGHT = 340;
  const bottomPx = 10 + pct * (TRACK_HEIGHT - 80);

  if (!animate) {
    rocketEl.style.transition = 'none';
    fillEl.style.transition = 'none';
  } else {
    rocketEl.style.transition = 'bottom 0.6s cubic-bezier(0.34,1.56,0.64,1)';
    fillEl.style.transition = 'height 0.6s cubic-bezier(0.34,1.56,0.64,1)';
  }

  rocketEl.style.bottom = bottomPx + 'px';
  fillEl.style.height = (pct * 100) + '%';
  fillEl.style.background = `linear-gradient(to top, ${p.color}33, transparent)`;
  scoreEl.textContent = p.score;

  // Rank-based glow on card
  const maxScore = Math.max(...players.map(p => p.score));
  if (cardEl) {
    if (p.score === maxScore && p.score > 0 && players.length > 1) {
      cardEl.className = 'player-card leading';
    } else {
      cardEl.className = 'player-card';
    }
  }
}

function changeScore(i, val) {
  if (!gameStarted) { toast('Hit LAUNCH first!'); return; }
  players[i].score += val;
  updateRocketVisual(i);

  if (val < 0) {
    launchAsteroid(i);
  } else {
    triggerBoostFx(i);
  }

  checkWin(i);
}

function applyCustom(i) {
  if (!gameStarted) { toast('Hit LAUNCH first!'); return; }
  const input = document.getElementById(`custom${i}`);
  const value = parseFloat(input.value);
  if (isNaN(value)) return;
  players[i].score += value;
  input.value = '';
  updateRocketVisual(i);

  if (value < 0) launchAsteroid(i);
  else triggerBoostFx(i);

  checkWin(i);
}

function triggerBoostFx(i) {
  const rocket = document.getElementById(`rocket${i}`);
  if (!rocket) return;
  const rect = rocket.getBoundingClientRect();
  spawnBoost(rect.left + rect.width/2, rect.top + rect.height/2, players[i].color);
}

function launchAsteroid(i) {
  const rocketEl = document.getElementById(`rocket${i}`);
  if (!rocketEl) return;
  const ast = new Asteroid(rocketEl, () => {
    // Shake the rocket
    rocketEl.classList.remove('shaking');
    void rocketEl.offsetWidth;
    rocketEl.classList.add('shaking');
    setTimeout(() => rocketEl.classList.remove('shaking'), 600);
    updateRocketVisual(i);
  });
  fxObjects.push(ast);
}

function checkWin(i) {
  const mode = document.getElementById('mode').value;
  const target = parseFloat(document.getElementById('targetValue').value) || 10;
  if (mode === 'score' && players[i].score >= target) {
    endGame();
  }
}

function removePlayer(i) {
  players.splice(i, 1);
  renderPlayers();
}

function startGame() {
  if (players.length === 0) { toast('Add at least one pilot!'); return; }
  gameStarted = true;
  document.getElementById('statusBar').innerHTML = 'MISSION IN PROGRESS';

  // Disable add player during game
  const mode = document.getElementById('mode').value;
  if (mode === 'time') {
    timeLeft = parseInt(document.getElementById('targetValue').value) || 30;
    updateTimerDisplay();
    timerInterval = setInterval(() => {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) endGame();
    }, 1000);
  }

  meteorSpawnInterval = setInterval(() => {
    if (Math.random() < 0.5) fxObjects.push(new Meteor());
  }, 600);

  toast('Mission started! 🚀');
}

function updateTimerDisplay() {
  const m = Math.floor(timeLeft / 60).toString().padStart(2,'0');
  const s = (timeLeft % 60).toString().padStart(2,'0');
  document.getElementById('statusBar').innerHTML =
    `MISSION IN PROGRESS &nbsp;|&nbsp; <span id="timer">T−${m}:${s}</span>`;
}

function endGame() {
  clearInterval(meteorSpawnInterval);
  clearInterval(timerInterval);
  gameStarted = false;

  const sorted = [...players].sort((a, b) => b.score - a.score);

  document.getElementById('winnerText').textContent =
    sorted.length ? `🏆 ${sorted[0].name} Wins!` : 'No Winner';

  // Build podium
  const podium = document.getElementById('podium');
  podium.innerHTML = '';

  const medal = ['🥇','🥈','🥉'];
  const cls = ['gold','silver','bronze'];
  const order = sorted.length >= 2 ? [1, 0, 2] : [0];

  order.forEach(rank => {
    if (!sorted[rank]) return;
    const step = document.createElement('div');
    step.className = `podium-step podium-${cls[rank] || 'bronze'}`;
    step.style.color = sorted[rank].color;
    step.innerHTML = `
      <div class="podium-name" style="color:white">${escHtml(sorted[rank].name)}</div>
      <div class="podium-block" style="${rank===0?'':''}">
        <div class="podium-medal">${medal[rank]||'🎖️'}</div>
        <div class="podium-score-text">${sorted[rank].score} pts</div>
        <div class="podium-place">${['1ST','2ND','3RD'][rank]||''}</div>
      </div>
    `;
    podium.appendChild(step);
  });

  // Full ranking
  const allScores = document.getElementById('allScores');
  allScores.innerHTML = sorted.slice(3).map((p, i) =>
    `<div class="result-row">${i+4}. ${escHtml(p.name)} — ${p.score} pts</div>`
  ).join('');

  document.getElementById('results').style.display = 'flex';
}

/* ── Toast ── */
function toast(msg) {
  const el = document.createElement('div');
  el.className = 'toast';
  el.textContent = msg;
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2200);
}

/* ── Keyboard shortcut: Enter to add player ── */
document.getElementById('playerNameInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') addPlayer();
});
</script>
