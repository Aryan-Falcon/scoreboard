<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Scoreboard</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}

body{
  background: radial-gradient(circle at 50% 30%, #0a0f2c, #020412 80%);
  color:white;
  overflow-x:hidden;
  position:relative;
}

/* Star field */
body::before{
  content:"";
  position:fixed;
  inset:0;
  background-image:radial-gradient(white 1px,transparent 1px);
  background-size:50px 50px;
  animation:stars 120s linear infinite;
  opacity:0.25;
  pointer-events:none;
  z-index:-1;
}
@keyframes stars{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

h1{text-align:center;padding:20px;font-size:2.6em;text-shadow:0 0 20px cyan;}

.controls{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  padding:10px;
}

input,select,button{
  padding:8px 12px;
  border-radius:8px;
  border:none;
  font-size:1em;
}

button{
  cursor:pointer;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
}
button:hover{opacity:0.85}

#gameArea{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:30px;
  padding:40px 20px;
  min-height:500px;
  flex-wrap:wrap;
}

.playerColumn{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:140px;
}

.track{
  width:60px;
  height:350px;
  background:linear-gradient(to top,#222,#111);
  border-radius:30px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 20px rgba(0,255,255,0.3);
}

/* Custom rocket shape */
.rocket{
  position:absolute;
  bottom:0;
  left:12px;
  width:35px;
  height:70px;
  transition:bottom 0.5s ease-out;
}

.rocket-body{
  width:35px;
  height:55px;
  background:red;
  border-radius:20px 20px 10px 10px;
  position:relative;
}

.rocket-window{
  width:12px;
  height:12px;
  background:white;
  border-radius:50%;
  position:absolute;
  top:15px;
  left:11px;
}

.rocket-flame{
  width:10px;
  height:20px;
  background:orange;
  margin:auto;
  border-radius:50%;
  animation:flame 0.2s infinite alternate;
}
@keyframes flame{
  from{transform:scaleY(1);}
  to{transform:scaleY(1.5);}
}

.playerName{margin:8px 0;font-weight:bold;}
.scoreControls{display:flex;flex-direction:column;gap:6px;align-items:center;}
.scoreControls input{width:80px;text-align:center;}

/* Better meteors */
.meteor{
  position:fixed;
  top:-80px;
  right:-80px;
  width:6px;
  height:120px;
  background:linear-gradient(white,orange,transparent);
  border-radius:50%;
  box-shadow:0 0 20px orange;
  transform:rotate(-45deg);
  animation:meteorFall 1.5s linear forwards;
  pointer-events:none;
}

@keyframes meteorFall{
  to{
    transform:translate(-1200px,1200px) rotate(-45deg);
    opacity:0;
  }
}

#results{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,0.95);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:1000;
}

.winnerText{
  font-size:3em;
  color:gold;
  margin-bottom:30px;
  text-shadow:0 0 30px gold;
}

.podium{
  display:flex;
  gap:20px;
  align-items:flex-end;
}

.step{
  width:120px;
  text-align:center;
  border-radius:10px 10px 0 0;
  padding:10px;
  font-weight:bold;
  animation:rise 1s ease forwards;
  transform:translateY(200px);
}

@keyframes rise{
  to{transform:translateY(0);}
}

.gold{background:gold;height:200px;color:black;}
.silver{background:silver;height:160px;color:black;}
.bronze{background:#cd7f32;height:130px;color:black;}
</style>
</head>

<body>

<h1>🚀 COSMIC SCOREBOARD</h1>

<div class="controls">
<select id="mode">
<option value="score">Score to Win</option>
<option value="time">Timed Game</option>
</select>

<input type="number" id="targetValue" placeholder="Target Score / Seconds">

<input type="text" id="playerNameInput" placeholder="Player Name">
<input type="color" id="playerColor" value="#ff0000">

<button onclick="addPlayer()">Add Player</button>
<button onclick="startGame()">Start</button>
<button onclick="endGame()">End</button>
</div>

<div id="gameArea"></div>

<div id="results">
<div class="winnerText"></div>
<div class="podium" id="podium"></div>
<button onclick="location.reload()">Play Again</button>
</div>

<script>
let players=[];
let gameStarted=false;
let meteorInterval;

function addPlayer(){
  const name=document.getElementById("playerNameInput").value.trim();
  const color=document.getElementById("playerColor").value;
  if(!name) return;

  players.push({name,score:0,color});
  document.getElementById("playerNameInput").value="";
  renderPlayers();
}

function renderPlayers(){
  const area=document.getElementById("gameArea");
  area.innerHTML="";

  players.forEach((p,i)=>{
    const col=document.createElement("div");
    col.className="playerColumn";

    col.innerHTML=`
      <div class="playerName">${p.name}</div>
      <div class="track">
        <div class="rocket" id="rocket${i}">
          <div class="rocket-body" style="background:${p.color}">
            <div class="rocket-window"></div>
          </div>
          <div class="rocket-flame"></div>
        </div>
      </div>
      <div>Score: <span id="score${i}">${p.score}</span></div>
      <div class="scoreControls">
        <button onclick="changeScore(${i},1)">+1</button>
        <button onclick="changeScore(${i},-1)">-1</button>
        <input type="number" id="custom${i}" placeholder="Enter #">
        <button onclick="applyCustom(${i})">Apply</button>
        <button onclick="removePlayer(${i})">Remove</button>
      </div>
    `;
    area.appendChild(col);
  });
}

function changeScore(i,val){
  if(!gameStarted) return;
  players[i].score+=val;
  updatePlayer(i);
}

function applyCustom(i){
  if(!gameStarted) return;
  const input=document.getElementById(`custom${i}`);
  const value=parseFloat(input.value);
  if(!isNaN(value)){
    players[i].score+=value;
    input.value="";
    updatePlayer(i);
  }
}

function updatePlayer(i){
  document.getElementById(`score${i}`).textContent=players[i].score;
  const rocket=document.getElementById(`rocket${i}`);
  const target=parseFloat(document.getElementById("targetValue").value)||10;

  let percent=players[i].score/target;
  percent=Math.max(0,Math.min(percent,1));
  rocket.style.bottom=(percent*280)+"px";

  if(percent>=1 && document.getElementById("mode").value==="score"){
    endGame();
  }
}

function removePlayer(i){
  players.splice(i,1);
  renderPlayers();
}

function startGame(){
  if(players.length===0) return;
  gameStarted=true;

  if(document.getElementById("mode").value==="time"){
    const seconds=parseInt(document.getElementById("targetValue").value)||30;
    setTimeout(endGame,seconds*1000);
  }

  meteorInterval=setInterval(spawnMeteor,400);
}

function spawnMeteor(){
  const meteor=document.createElement("div");
  meteor.className="meteor";
  meteor.style.right=Math.random()*window.innerWidth+"px";
  document.body.appendChild(meteor);
  setTimeout(()=>meteor.remove(),1500);
}

function endGame(){
  clearInterval(meteorInterval);
  gameStarted=false;

  players.sort((a,b)=>b.score-a.score);

  document.getElementById("results").style.display="flex";
  document.querySelector(".winnerText").textContent=`🏆 ${players[0].name} Wins! 🏆`;

  const podium=document.getElementById("podium");
  podium.innerHTML="";

  if(players[1])
    podium.innerHTML+=`<div class="step silver">${players[1].name}<br>${players[1].score}</div>`;

  podium.innerHTML+=`<div class="step gold">${players[0].name}<br>${players[0].score}</div>`;

  if(players[2])
    podium.innerHTML+=`<div class="step bronze">${players[2].name}<br>${players[2].score}</div>`;
}
</script>

</body>
</html>
