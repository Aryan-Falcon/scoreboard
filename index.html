<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rocket Race Premium</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    color: white;
    text-align: center;
    overflow-x: hidden;
    background: linear-gradient(to bottom, #020111 0%, #191621 60%, #000814 100%);
}

/* TWINKLING STARS */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image:
        radial-gradient(white 1px, transparent 1px),
        radial-gradient(white 1px, transparent 1px);
    background-size: 80px 80px, 120px 120px;
    animation: starsMove 200s linear infinite;
    opacity: 0.3;
    z-index: -2;
}

@keyframes starsMove {
    from { transform: translate(0,0); }
    to { transform: translate(-800px,-800px); }
}

/* FLOATING PLANETS */
.planet {
    position: fixed;
    border-radius: 50%;
    opacity: 0.2;
    z-index: -1;
    animation: floatPlanet 30s ease-in-out infinite alternate;
}

.planet1 {
    width: 200px;
    height: 200px;
    background: radial-gradient(circle at 30% 30%, #6a00ff, #2a004f);
    top: 60px;
    left: -80px;
}

.planet2 {
    width: 150px;
    height: 150px;
    background: radial-gradient(circle at 30% 30%, #00c3ff, #00394f);
    bottom: 50px;
    right: -60px;
}

@keyframes floatPlanet {
    from { transform: translateY(0); }
    to { transform: translateY(40px); }
}

/* GLASS PANELS */
.controls {
    margin: 15px auto;
    padding: 10px;
    width: fit-content;
    backdrop-filter: blur(8px);
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    box-shadow: 0 0 15px rgba(0,255,255,0.1);
}

input, button, select {
    padding: 7px;
    margin: 4px;
    border-radius: 6px;
    border: none;
    font-size: 14px;
}

button {
    cursor: pointer;
    font-weight: bold;
    background: linear-gradient(45deg, #00c3ff, #6a00ff);
    color: white;
    box-shadow: 0 0 10px rgba(0,255,255,0.4);
    transition: 0.2s;
}

button:hover {
    transform: scale(1.05);
}

#gameArea {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 70px;
    margin-top: 40px;
    min-height: 550px;
}

.playerColumn {
    width: 160px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.trackContainer {
    height: 450px;
    width: 80px;
    position: relative;
    margin-bottom: 15px;
}

.track {
    position: absolute;
    width: 10px;
    height: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.15);
    border-radius: 6px;
    box-shadow: 0 0 10px rgba(255,255,255,0.1);
}

.finishLine {
    position: absolute;
    top: 0;
    width: 100%;
    height: 6px;
    background: linear-gradient(90deg, yellow, orange);
    box-shadow: 0 0 15px yellow;
}

/* ROCKET */
.rocket {
    position: absolute;
    bottom: 0;
    width: 50px;
    left: 50%;
    transform: translateX(-50%);
    transition: bottom 0.6s cubic-bezier(.25,.8,.25,1);
}

.nose {
    width: 0;
    height: 0;
    border-left: 12px solid transparent;
    border-right: 12px solid transparent;
    border-bottom: 18px solid;
    margin: auto;
}

.body {
    width: 24px;
    height: 50px;
    margin: auto;
    border-radius: 12px;
    box-shadow: inset 0 0 10px rgba(255,255,255,0.5);
}

.flame {
    width: 10px;
    height: 18px;
    margin: auto;
    background: radial-gradient(circle, yellow, orange, red);
    border-radius: 50%;
    animation: flameFlicker 0.15s infinite alternate;
    box-shadow: 0 0 12px orange;
}

@keyframes flameFlicker {
    from { height: 14px; }
    to { height: 24px; }
}

.scoreDisplay {
    font-weight: bold;
    margin-bottom: 8px;
    text-shadow: 0 0 8px cyan;
}

.scoreControls input {
    width: 85%;
    text-align: center;
}

.scoreControls button {
    width: 95%;
    margin: 4px 0;
}

#results {
    margin-top: 30px;
    font-size: 20px;
    text-shadow: 0 0 8px gold;
}
</style>
</head>

<body>

<div class="planet planet1"></div>
<div class="planet planet2"></div>

<h1>🚀 Rocket Race</h1>

<div class="controls">
    <select id="mode">
        <option value="score">Target Score</option>
        <option value="time">Time Limit</option>
    </select>
    <input type="number" id="targetInput" placeholder="Score or seconds">
    <button id="startBtn">Start Game</button>
</div>

<div class="controls">
    <input type="text" id="playerName" placeholder="Player name">
    <input type="color" id="playerColor" value="#ff4444">
    <button id="addPlayerBtn">Add Player</button>
</div>

<div id="gameArea"></div>
<div id="results"></div>

<script>
let players = [];
let target = 0;
let mode = "score";
let gameActive = false;

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("addPlayerBtn").addEventListener("click", addPlayer);

function startGame() {
    target = Number(document.getElementById("targetInput").value);
    if (!target || target <= 0) return alert("Enter valid number.");
    players.forEach(p => p.score = 0);
    gameActive = true;
    document.getElementById("results").innerHTML = "";
    render();
}

function addPlayer() {
    const name = document.getElementById("playerName").value.trim();
    const color = document.getElementById("playerColor").value;
    if (!name) return;
    players.push({ name, color, score: 0 });
    document.getElementById("playerName").value = "";
    render();
}

function changeScore(index, amount) {
    if (!gameActive) return;
    players[index].score += amount;
    if (players[index].score < 0) players[index].score = 0;
    updateDisplay(index);
    if (players[index].score >= target) endGame();
}

function updateDisplay(index) {
    document.getElementById("score-"+index).textContent = players[index].score;
    const rocket = document.getElementById("rocket-"+index);
    let percent = players[index].score / target;
    if (percent > 1) percent = 1;
    rocket.style.bottom = (percent * 410) + "px";
}

function endGame() {
    gameActive = false;
    let sorted = [...players].sort((a,b)=>b.score-a.score);
    let html = "<h2>🏆 Final Results</h2>";
    sorted.forEach((p,i)=>{
        html += `<div>${i+1}. ${p.name} - ${p.score}</div>`;
    });
    document.getElementById("results").innerHTML = html;
}

function render() {
    const area = document.getElementById("gameArea");
    area.innerHTML = "";

    players.forEach((player,index)=>{

        const column = document.createElement("div");
        column.className = "playerColumn";

        const scoreDisplay = document.createElement("div");
        scoreDisplay.className = "scoreDisplay";
        scoreDisplay.innerHTML = `${player.name}: <span id="score-${index}">${player.score}</span>`;
        column.appendChild(scoreDisplay);

        const trackContainer = document.createElement("div");
        trackContainer.className = "trackContainer";

        const track = document.createElement("div");
        track.className = "track";

        const finishLine = document.createElement("div");
        finishLine.className = "finishLine";

        const rocket = document.createElement("div");
        rocket.className = "rocket";
        rocket.id = "rocket-"+index;

        const nose = document.createElement("div");
        nose.className = "nose";
        nose.style.borderBottomColor = player.color;

        const body = document.createElement("div");
        body.className = "body";
        body.style.background = player.color;

        const flame = document.createElement("div");
        flame.className = "flame";

        rocket.appendChild(nose);
        rocket.appendChild(body);
        rocket.appendChild(flame);

        trackContainer.appendChild(track);
        trackContainer.appendChild(finishLine);
        trackContainer.appendChild(rocket);

        column.appendChild(trackContainer);

        const controls = document.createElement("div");
        controls.className = "scoreControls";

        const plus = document.createElement("button");
        plus.textContent = "+1";
        plus.addEventListener("click", () => changeScore(index,1));

        const minus = document.createElement("button");
        minus.textContent = "-1";
        minus.addEventListener("click", () => changeScore(index,-1));

        const input = document.createElement("input");
        input.type = "number";
        input.placeholder = "+/- amount";

        const apply = document.createElement("button");
        apply.textContent = "Apply";
        apply.addEventListener("click", () => {
            const value = Number(input.value);
            if (!value) return;
            changeScore(index, value);
            input.value = "";
        });

        controls.appendChild(plus);
        controls.appendChild(minus);
        controls.appendChild(input);
        controls.appendChild(apply);

        column.appendChild(controls);
        area.appendChild(column);

        updateDisplay(index);
    });
}
</script>

</body>
</html>
