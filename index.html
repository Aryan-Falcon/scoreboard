<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Rocket Race Scoreboard</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    color: white;
    text-align: center;
    background: radial-gradient(circle at bottom, #0b1d2a 0%, #000814 80%);
    overflow-x: hidden;
}

/* Star background */
body::before {
    content: "";
    position: fixed;
    width: 200%;
    height: 200%;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 50px 50px;
    animation: stars 120s linear infinite;
    opacity: 0.2;
    z-index: -1;
}

@keyframes stars {
    from { transform: translate(0,0); }
    to { transform: translate(-500px,-500px); }
}

h1 {
    margin-top: 20px;
}

.controls {
    margin: 10px;
}

input, button, select {
    padding: 6px;
    margin: 4px;
    border-radius: 6px;
    border: none;
}

button {
    cursor: pointer;
    font-weight: bold;
}

#gameArea {
    display: flex;
    justify-content: center;
    align-items: flex-end;
    gap: 50px;
    margin-top: 30px;
    min-height: 500px;
}

.playerColumn {
    width: 140px;
    display: flex;
    flex-direction: column;
    align-items: center;
}

.trackContainer {
    height: 400px;
    width: 70px;
    position: relative;
    margin-bottom: 10px;
}

.track {
    position: absolute;
    width: 8px;
    height: 100%;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(255,255,255,0.2);
    border-radius: 5px;
}

.finishLine {
    position: absolute;
    top: 0;
    width: 100%;
    height: 5px;
    background: yellow;
}

.rocket {
    position: absolute;
    bottom: 0;
    width: 40px;
    left: 50%;
    transform: translateX(-50%);
    transition: bottom 0.5s ease;
}

.nose {
    width: 0;
    height: 0;
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-bottom: 15px solid red;
    margin: auto;
}

.body {
    width: 20px;
    height: 40px;
    margin: auto;
    border-radius: 10px;
}

.fins {
    width: 40px;
    height: 10px;
    background: inherit;
    border-radius: 5px;
    margin: auto;
}

.flame {
    width: 8px;
    height: 12px;
    background: orange;
    margin: auto;
    border-radius: 50%;
    animation: flame 0.2s infinite alternate;
}

@keyframes flame {
    from { height: 10px; }
    to { height: 18px; }
}

.playerName {
    font-weight: bold;
    margin-bottom: 6px;
}

.scoreControls input {
    width: 80%;
    text-align: center;
}

.scoreControls button {
    width: 90%;
    margin: 3px 0;
}

#timerDisplay {
    margin-top: 10px;
    font-size: 18px;
}

#results {
    margin-top: 20px;
    font-size: 18px;
}
</style>
</head>

<body>

<h1>🚀 Rocket Race</h1>

<div class="controls">
    <select id="mode">
        <option value="score">Target Score</option>
        <option value="time">Time Limit</option>
    </select>

    <input type="number" id="targetInput" placeholder="Score or seconds">
    <button id="startBtn">Start Game</button>
</div>

<div class="controls">
    <input type="text" id="playerName" placeholder="Player name">
    <input type="color" id="playerColor" value="#ff4444">
    <button id="addPlayerBtn">Add Player</button>
</div>

<div id="timerDisplay"></div>
<div id="gameArea"></div>
<div id="results"></div>

<script>
let players = [];
let target = 0;
let mode = "score";
let gameActive = false;
let timerInterval = null;
let timeLeft = 0;

document.getElementById("startBtn").addEventListener("click", startGame);
document.getElementById("addPlayerBtn").addEventListener("click", addPlayer);

function startGame() {
    target = Number(document.getElementById("targetInput").value);
    if (!target || target <= 0) {
        alert("Enter valid number.");
        return;
    }

    mode = document.getElementById("mode").value;
    players.forEach(p => p.score = 0);
    gameActive = true;
    document.getElementById("results").innerHTML = "";

    if (mode === "time") {
        timeLeft = target;
        updateTimer();
        clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            timeLeft--;
            updateTimer();
            if (timeLeft <= 0) endGame();
        }, 1000);
    } else {
        document.getElementById("timerDisplay").innerText = "";
        clearInterval(timerInterval);
    }

    render();
}

function updateTimer() {
    document.getElementById("timerDisplay").innerText = "Time Left: " + timeLeft + "s";
}

function addPlayer() {
    const name = document.getElementById("playerName").value.trim();
    const color = document.getElementById("playerColor").value;

    if (!name) return;

    players.push({ name, color, score: 0 });
    document.getElementById("playerName").value = "";
    render();
}

function changeScore(index, amount) {
    if (!gameActive) return;

    players[index].score += amount;
    if (players[index].score < 0) players[index].score = 0;

    updateRocket(index);

    if (mode === "score" && players[index].score >= target) {
        endGame();
    }
}

function applyCustomScore(index) {
    const input = document.getElementById("custom-" + index);
    const value = Number(input.value);

    if (!value) return;

    changeScore(index, value);
    input.value = "";
}

function endGame() {
    gameActive = false;
    clearInterval(timerInterval);

    let sorted = [...players].sort((a,b)=>b.score-a.score);
    let html = "<h2>🏆 Results</h2>";
    sorted.forEach((p,i)=>{
        html += `<div>${i+1}. ${p.name} - ${p.score}</div>`;
    });
    document.getElementById("results").innerHTML = html;
}

function updateRocket(index) {
    const rocket = document.getElementById("rocket-"+index);

    let percent = 0;
    if (mode === "score") {
        percent = players[index].score / target;
    } else {
        const maxScore = Math.max(...players.map(p=>p.score),1);
        percent = players[index].score / maxScore;
    }

    if (percent > 1) percent = 1;
    rocket.style.bottom = (percent * 360) + "px";
}

function render() {
    const area = document.getElementById("gameArea");
    area.innerHTML = "";

    players.forEach((player,index)=>{

        const column = document.createElement("div");
        column.className = "playerColumn";

        const name = document.createElement("div");
        name.className = "playerName";
        name.innerText = player.name + " (" + player.score + ")";
        column.appendChild(name);

        const trackContainer = document.createElement("div");
        trackContainer.className = "trackContainer";

        const track = document.createElement("div");
        track.className = "track";

        const finishLine = document.createElement("div");
        finishLine.className = "finishLine";

        const rocket = document.createElement("div");
        rocket.className = "rocket";
        rocket.id = "rocket-"+index;

        const nose = document.createElement("div");
        nose.className = "nose";
        nose.style.borderBottomColor = player.color;

        const body = document.createElement("div");
        body.className = "body";
        body.style.background = player.color;

        const flame = document.createElement("div");
        flame.className = "flame";

        rocket.appendChild(nose);
        rocket.appendChild(body);
        rocket.appendChild(flame);

        trackContainer.appendChild(track);
        trackContainer.appendChild(finishLine);
        trackContainer.appendChild(rocket);

        column.appendChild(trackContainer);

        const controls = document.createElement("div");
        controls.className = "scoreControls";

        const plus = document.createElement("button");
        plus.innerText = "+1";
        plus.onclick = () => changeScore(index,1);

        const minus = document.createElement("button");
        minus.innerText = "-1";
        minus.onclick = () => changeScore(index,-1);

        const input = document.createElement("input");
        input.type = "number";
        input.inputMode = "numeric";
        input.placeholder = "+/- amount";
        input.id = "custom-"+index;

        const apply = document.createElement("button");
        apply.innerText = "Apply";
        apply.onclick = () => applyCustomScore(index);

        controls.appendChild(plus);
        controls.appendChild(minus);
        controls.appendChild(input);
        controls.appendChild(apply);

        column.appendChild(controls);
        area.appendChild(column);

        updateRocket(index);
    });
}
</script>

</body>
</html>
