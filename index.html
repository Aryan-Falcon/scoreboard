<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cosmic Scoreboard</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',sans-serif;}
body{
  background: radial-gradient(circle at 50% 30%, #0a0f2c, #020412 80%);
  color:white;
  overflow-x:hidden;
}

/* Animated Stars */
body::before{
  content:"";
  position:fixed;
  width:200%;
  height:200%;
  background-image:radial-gradient(white 1px,transparent 1px);
  background-size:50px 50px;
  animation:stars 120s linear infinite;
  opacity:0.3;
}
@keyframes stars{
  from{transform:translate(0,0);}
  to{transform:translate(-500px,-500px);}
}

h1{text-align:center;padding:20px;font-size:2.8em;letter-spacing:2px;text-shadow:0 0 20px cyan;}
.controls{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;padding:10px;}
input,button,select{
  padding:8px 12px;
  border:none;
  border-radius:8px;
  font-size:1em;
}
button{
  cursor:pointer;
  background:linear-gradient(45deg,#00c6ff,#0072ff);
  color:white;
  font-weight:bold;
}
button:hover{opacity:0.85}

#gameArea{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:30px;
  padding:40px 20px;
  position:relative;
  min-height:500px;
}

.playerColumn{
  display:flex;
  flex-direction:column;
  align-items:center;
  width:120px;
  position:relative;
}

.track{
  width:50px;
  height:350px;
  background:linear-gradient(to top,#222,#111);
  border-radius:25px;
  position:relative;
  overflow:hidden;
  box-shadow:0 0 15px rgba(255,255,255,0.2);
}

.rocket{
  position:absolute;
  bottom:0;
  width:40px;
  height:60px;
  left:5px;
  transition:bottom 0.6s ease-out;
  font-size:40px;
}

.flame{
  position:absolute;
  bottom:-20px;
  left:10px;
  font-size:20px;
  animation:flame 0.2s infinite alternate;
}
@keyframes flame{
  from{transform:scaleY(1);}
  to{transform:scaleY(1.4);}
}

.playerName{margin:8px 0;font-weight:bold;}
.scoreControls{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.scoreControls input{
  width:70px;
  text-align:center;
}

#results{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  z-index:100;
}

.podium{
  display:flex;
  align-items:flex-end;
  gap:20px;
  margin-top:30px;
}
.step{
  width:120px;
  text-align:center;
  font-size:1.3em;
  border-radius:10px 10px 0 0;
  animation:rise 1s ease forwards;
  transform:translateY(200px);
}
@keyframes rise{
  to{transform:translateY(0);}
}

.gold{background:gold;height:200px;color:black;}
.silver{background:silver;height:160px;color:black;}
.bronze{background:#cd7f32;height:130px;color:black;}

.winnerText{
  font-size:3em;
  color:gold;
  text-shadow:0 0 25px gold;
  animation:flash 1s infinite alternate;
}
@keyframes flash{
  from{opacity:0.6;}
  to{opacity:1;}
}

/* Meteor */
.meteor{
  position:fixed;
  top:-50px;
  font-size:25px;
  animation:meteorFall 3s linear forwards;
}
@keyframes meteorFall{
  to{
    transform:translate(300px,800px);
    opacity:0;
  }
}
</style>
</head>
<body>

<h1>🚀 COSMIC SCOREBOARD</h1>

<div class="controls">
<select id="mode">
<option value="score">Score to Win</option>
<option value="time">Timed Game</option>
</select>
<input type="number" id="targetValue" placeholder="Target Score or Seconds">
<input type="text" id="playerNameInput" placeholder="Player Name">
<input type="color" id="playerColor" value="#ff0000">
<button onclick="addPlayer()">Add Player</button>
<button onclick="startGame()">Start</button>
<button onclick="endGame()">End</button>
</div>

<div id="gameArea"></div>

<div id="results">
<div class="winnerText">🏆 WINNER 🏆</div>
<div class="podium" id="podium"></div>
<button onclick="location.reload()">Play Again</button>
</div>

<audio id="launchSound" src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg"></audio>
<audio id="scoreSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="winSound" src="https://actions.google.com/sounds/v1/alarms/digital_watch_alarm_long.ogg"></audio>

<script>
let players=[];
let gameStarted=false;
let meteorInterval;

function addPlayer(){
  const name=document.getElementById("playerNameInput").value;
  const color=document.getElementById("playerColor").value;
  if(!name) return;
  const player={name,score:0,color};
  players.push(player);
  renderPlayers();
}

function renderPlayers(){
  const area=document.getElementById("gameArea");
  area.innerHTML="";
  players.forEach((p,i)=>{
    const col=document.createElement("div");
    col.className="playerColumn";
    col.innerHTML=`
      <div class="playerName">${p.name}</div>
      <div class="track">
        <div class="rocket" id="rocket${i}" style="color:${p.color}">
          🚀
          <div class="flame">🔥</div>
        </div>
      </div>
      <div>Score: <span id="score${i}">0</span></div>
      <div class="scoreControls">
        <button onclick="changeScore(${i},1)">+</button>
        <button onclick="changeScore(${i},-1)">-</button>
        <input type="number" id="custom${i}">
        <button onclick="applyCustom(${i})">Apply</button>
        <button onclick="removePlayer(${i})">Remove</button>
      </div>
    `;
    area.appendChild(col);
  });
}

function changeScore(i,val){
  if(!gameStarted) return;
  players[i].score+=val;
  updatePlayer(i);
}

function applyCustom(i){
  if(!gameStarted) return;
  const input=document.getElementById(`custom${i}`);
  const val=parseInt(input.value);
  if(!isNaN(val)){
    players[i].score+=val;
    input.value="";
    updatePlayer(i);
  }
}

function updatePlayer(i){
  document.getElementById(`score${i}`).textContent=players[i].score;
  const rocket=document.getElementById(`rocket${i}`);
  const target=parseInt(document.getElementById("targetValue").value)||10;
  const percent=Math.min(players[i].score/target,1);
  rocket.style.bottom=(percent*290)+"px";
  document.getElementById("scoreSound").play();
  if(percent>=1 && document.getElementById("mode").value==="score"){
    endGame();
  }
}

function removePlayer(i){
  players.splice(i,1);
  renderPlayers();
}

function startGame(){
  gameStarted=true;
  document.getElementById("launchSound").play();
  if(document.getElementById("mode").value==="time"){
    const seconds=parseInt(document.getElementById("targetValue").value)||30;
    setTimeout(endGame,seconds*1000);
  }
  meteorInterval=setInterval(spawnMeteor,800);
}

function spawnMeteor(){
  const meteor=document.createElement("div");
  meteor.className="meteor";
  meteor.style.left=Math.random()*window.innerWidth+"px";
  meteor.textContent="☄️";
  document.body.appendChild(meteor);
  setTimeout(()=>meteor.remove(),3000);
}

function endGame(){
  clearInterval(meteorInterval);
  gameStarted=false;
  document.getElementById("winSound").play();
  players.sort((a,b)=>b.score-a.score);
  document.getElementById("results").style.display="flex";
  document.querySelector(".winnerText").textContent=`🏆 ${players[0].name} Wins! 🏆`;
  const podium=document.getElementById("podium");
  podium.innerHTML="";
  if(players[1]) podium.innerHTML+=`<div class="step silver">${players[1].name}<br>${players[1].score}</div>`;
  podium.innerHTML+=`<div class="step gold">${players[0].name}<br>${players[0].score}</div>`;
  if(players[2]) podium.innerHTML+=`<div class="step bronze">${players[2].name}<br>${players[2].score}</div>`;
}
</script>

</body>
</html>
