<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOVA SCOREBOARD</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #02030c;
  --panel: rgba(8,12,35,0.88);
  --accent: #00e5ff;
  --accent2: #ff3cac;
  --gold: #ffd700;
  --silver: #c0c0c0;
  --bronze: #cd7f32;
  --glow: 0 0 20px rgba(0,229,255,0.5);
  --nebula1: #1a0035;
  --nebula2: #001a40;
  --nebula3: #350010;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: #fff;
  font-family: 'Rajdhani', sans-serif;
  overflow-x: hidden;
  min-height: 100vh;
}

/* ── LAYERED BACKGROUND CANVASES ── */
#bgCanvas, #nebulaCanvas, #warpCanvas, #fxCanvas {
  position: fixed; inset: 0; pointer-events: none;
}
#bgCanvas    { z-index: 0; }
#nebulaCanvas{ z-index: 1; }
#warpCanvas  { z-index: 2; }
#fxCanvas    { z-index: 10; }

/* ── HEADER ── */
header {
  position: relative; z-index: 5;
  text-align: center; padding: 28px 20px 10px;
}
header h1 {
  font-family: 'Orbitron', monospace;
  font-size: clamp(1.8em, 4vw, 3.2em);
  font-weight: 900; letter-spacing: 0.12em;
  background: linear-gradient(90deg, var(--accent), var(--accent2), var(--gold));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
  filter: drop-shadow(0 0 22px rgba(0,229,255,0.8));
}
.subtitle {
  font-family: 'Orbitron', monospace; font-size: 0.75em;
  letter-spacing: 0.4em; color: rgba(0,229,255,0.5); margin-top: 4px;
}

/* ── CONTROL PANEL ── */
#controlPanel {
  position: relative; z-index: 5;
  background: var(--panel);
  border: 1px solid rgba(0,229,255,0.2);
  border-radius: 16px; padding: 20px;
  max-width: 960px; margin: 16px auto;
  backdrop-filter: blur(24px);
  box-shadow: var(--glow), inset 0 1px 0 rgba(255,255,255,0.05);
}
.panel-title {
  font-family: 'Orbitron', monospace; font-size: 0.7em;
  letter-spacing: 0.3em; color: var(--accent); margin-bottom: 14px;
  text-transform: uppercase;
}
.controls-grid {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(145px, 1fr));
  gap: 10px; align-items: end;
}
.ctrl-group { display: flex; flex-direction: column; gap: 5px; }
.ctrl-group label {
  font-size: 0.72em; letter-spacing: 0.15em;
  color: rgba(255,255,255,0.5); text-transform: uppercase;
}
input[type="text"], input[type="number"], select {
  background: rgba(0,0,0,0.4);
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 8px; color: white;
  padding: 9px 12px; font-family: 'Rajdhani', sans-serif;
  font-size: 1em; font-weight: 500; width: 100%;
  transition: border-color 0.2s, box-shadow 0.2s; outline: none;
}
input:focus, select:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(0,229,255,0.15);
}
select option { background: #0a0f2c; }
input[type="color"] {
  width: 48px; height: 40px;
  border: 1px solid rgba(0,229,255,0.25);
  border-radius: 8px; padding: 2px;
  background: rgba(0,0,0,0.4); cursor: pointer;
}

/* ── SHIP PREVIEW ── */
#shipPreviewWrap {
  display: flex; align-items: center; justify-content: center;
  width: 60px; height: 60px;
  background: rgba(0,229,255,0.04);
  border: 1px solid rgba(0,229,255,0.15);
  border-radius: 12px; overflow: hidden;
}

/* ── BUTTONS ── */
.btn {
  font-family: 'Orbitron', monospace; font-size: 0.7em;
  font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 10px 16px; border: none; border-radius: 8px;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
}
.btn::after { content:''; position:absolute; inset:0; background:white; opacity:0; transition:opacity 0.15s; }
.btn:active::after { opacity: 0.15; }
.btn-primary { background: linear-gradient(135deg, #0066ff, var(--accent)); color: white; box-shadow: 0 4px 20px rgba(0,229,255,0.3); }
.btn-primary:hover { box-shadow: 0 4px 30px rgba(0,229,255,0.6); transform: translateY(-1px); }
.btn-start { background: linear-gradient(135deg, #00c853, #69f0ae); color: #002010; box-shadow: 0 4px 20px rgba(0,200,83,0.35); }
.btn-start:hover { box-shadow: 0 4px 30px rgba(0,200,83,0.6); transform: translateY(-1px); }
.btn-end { background: linear-gradient(135deg, #ff1744, #ff6090); color: white; box-shadow: 0 4px 20px rgba(255,23,68,0.3); }
.btn-end:hover { box-shadow: 0 4px 30px rgba(255,23,68,0.6); transform: translateY(-1px); }
.btn-danger { background: rgba(255,50,50,0.15); border: 1px solid rgba(255,50,50,0.3); color: #ff6060; font-size: 0.65em; padding: 5px 8px; }
.btn-danger:hover { background: rgba(255,50,50,0.3); }
.btn-score { width:40px;height:40px;border-radius:50%;font-size:1.1em;font-family:'Orbitron',monospace;font-weight:900;display:flex;align-items:center;justify-content:center;padding:0;letter-spacing:0; }
.btn-plus { background:linear-gradient(135deg,#00c853,#69f0ae);color:#002010;box-shadow:0 2px 12px rgba(0,200,83,0.4); }
.btn-plus:hover { box-shadow:0 2px 20px rgba(0,200,83,0.7);transform:scale(1.08); }
.btn-minus { background:linear-gradient(135deg,#ff1744,#ff6090);color:white;box-shadow:0 2px 12px rgba(255,23,68,0.4); }
.btn-minus:hover { box-shadow:0 2px 20px rgba(255,23,68,0.7);transform:scale(1.08); }

/* ── GAME AREA ── */
#gameArea {
  position: relative; z-index: 5;
  display: flex; justify-content: center;
  align-items: flex-end; flex-wrap: wrap;
  gap: clamp(16px,3vw,40px);
  padding: 20px clamp(10px,3vw,40px) 40px;
  min-height: 480px;
}
.playerColumn { display:flex;flex-direction:column;align-items:center;gap:10px;position:relative; }
.player-card {
  background: var(--panel); border:1px solid rgba(255,255,255,0.08);
  border-radius:14px; padding:12px 14px; text-align:center; width:150px;
  backdrop-filter:blur(10px); transition:border-color 0.3s,box-shadow 0.3s;
}
.player-card.leading { border-color:rgba(255,215,0,0.5); box-shadow:0 0 24px rgba(255,215,0,0.25); }
.player-name { font-family:'Orbitron',monospace;font-size:0.82em;font-weight:700;letter-spacing:0.08em;color:white;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis; }
.player-score-display { font-family:'Orbitron',monospace;font-size:1.6em;font-weight:900;line-height:1;margin:4px 0; }
.player-rank { font-size:0.65em;letter-spacing:0.2em;color:rgba(255,255,255,0.35);text-transform:uppercase; }

/* ── LAUNCH TRACK ── */
.track-wrapper { position:relative;width:70px; }
.track {
  width:70px; height:340px;
  background:linear-gradient(to top,#050812 0%,#0c1230 100%);
  border-radius:35px; position:relative; overflow:hidden;
  border:1px solid rgba(0,229,255,0.12);
  box-shadow:inset 0 0 30px rgba(0,0,0,0.8);
}
.track::before {
  content:''; position:absolute; inset:0;
  background-image:repeating-linear-gradient(to top,transparent 0px,transparent 27px,rgba(0,229,255,0.07) 27px,rgba(0,229,255,0.07) 28px);
  border-radius:35px;
}
.track-fill {
  position:absolute; bottom:0; left:0; right:0;
  background:linear-gradient(to top,rgba(0,229,255,0.15),transparent);
  border-radius:35px;
  transition:height 0.6s cubic-bezier(0.34,1.56,0.64,1);
}
.rocket-wrap {
  position:absolute; left:50%; transform:translateX(-50%);
  bottom:10px; width:38px;
  transition:bottom 0.6s cubic-bezier(0.34,1.56,0.64,1);
  filter:drop-shadow(0 0 6px currentColor);
}
.rocket-wrap.shaking { animation:shake 0.5s ease; }
@keyframes shake {
  0%,100%{transform:translateX(-50%) rotate(0deg);}
  15%{transform:translateX(calc(-50% + 4px)) rotate(6deg);}
  30%{transform:translateX(calc(-50% - 4px)) rotate(-6deg);}
  45%{transform:translateX(calc(-50% + 3px)) rotate(4deg);}
  60%{transform:translateX(calc(-50% - 3px)) rotate(-4deg);}
  75%{transform:translateX(calc(-50% + 1px)) rotate(2deg);}
}
.rocket-thruster { animation:thruster 0.12s infinite alternate; transform-origin:top center; }
@keyframes thruster {
  from{transform:scaleY(1) scaleX(1);opacity:0.9;}
  to{transform:scaleY(1.4) scaleX(0.7);opacity:1;}
}

/* ── SCORE CONTROLS ── */
.score-controls { display:flex;align-items:center;gap:8px; }
.custom-score-wrap { display:flex;gap:5px;align-items:center;width:150px; }
.custom-score-wrap input { width:65px;padding:7px 8px;font-size:0.9em; }
.custom-score-wrap .btn { flex-shrink:0;padding:7px 10px;font-size:0.6em; }

/* ── STATUS BAR ── */
#statusBar {
  position:relative;z-index:5;text-align:center;padding:8px;
  font-family:'Orbitron',monospace;font-size:0.75em;letter-spacing:0.2em;
  color:rgba(0,229,255,0.6);min-height:32px;
}
#timer { font-size:1.4em;color:var(--accent);font-weight:700; }

/* ── RESULTS OVERLAY ── */
#results {
  position:fixed;inset:0;background:rgba(0,0,10,0.97);
  display:none;flex-direction:column;justify-content:center;
  align-items:center;z-index:200;gap:30px;
}
.results-title {
  font-family:'Orbitron',monospace;font-size:clamp(1.4em,4vw,2.8em);
  font-weight:900;letter-spacing:0.1em;
  background:linear-gradient(90deg,#ffd700,#ff8c00,#ffd700);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:shimmer 2s linear infinite;background-size:200%;
  filter:drop-shadow(0 0 20px rgba(255,215,0,0.6));
}
@keyframes shimmer { to{background-position:200% center;} }
.podium-wrap { display:flex;align-items:flex-end;gap:10px; }
.podium-step { display:flex;flex-direction:column;align-items:center;gap:8px; }
.podium-name { font-family:'Orbitron',monospace;font-size:0.75em;font-weight:700;letter-spacing:0.1em;text-align:center;max-width:100px;word-break:break-word; }
.podium-block { width:110px;border-radius:10px 10px 0 0;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;padding:12px 8px;font-family:'Orbitron',monospace;font-weight:900;animation:podiumRise 0.9s cubic-bezier(0.34,1.4,0.64,1) forwards;transform:translateY(300px); }
.podium-medal { font-size:2em;margin-bottom:4px; }
.podium-score-text { font-size:1.3em; }
.podium-place { font-size:0.65em;opacity:0.7;letter-spacing:0.2em; }
.podium-gold .podium-block { background:linear-gradient(to top,#b8860b,#ffd700);height:200px;color:#3d2500;animation-delay:0.1s; }
.podium-silver .podium-block { background:linear-gradient(to top,#888,#ddd);height:160px;color:#1a1a1a;animation-delay:0.25s; }
.podium-bronze .podium-block { background:linear-gradient(to top,#7a4010,#cd7f32);height:130px;color:#2a1000;animation-delay:0.4s; }
@keyframes podiumRise { to{transform:translateY(0);} }
.results-scores { display:flex;flex-direction:column;gap:5px;max-height:200px;overflow-y:auto;text-align:center; }
.result-row { font-family:'Orbitron',monospace;font-size:0.75em;color:rgba(255,255,255,0.6);letter-spacing:0.1em; }

/* ── TOAST ── */
.toast {
  position:fixed;top:20px;right:20px;z-index:300;
  background:var(--panel);border:1px solid rgba(0,229,255,0.3);
  border-radius:10px;padding:10px 18px;
  font-family:'Orbitron',monospace;font-size:0.75em;letter-spacing:0.1em;
  backdrop-filter:blur(20px);
  animation:toastIn 0.3s ease,toastOut 0.3s ease 1.8s forwards;pointer-events:none;
}
@keyframes toastIn{from{opacity:0;transform:translateX(40px);}to{opacity:1;transform:translateX(0);}}
@keyframes toastOut{to{opacity:0;transform:translateX(40px);}}

/* ── ASTEROID FLASH ── */
.asteroid-flash {
  position:fixed;inset:0;
  background:radial-gradient(circle,rgba(255,80,0,0.25) 0%,transparent 70%);
  z-index:9;pointer-events:none;animation:flashFade 0.5s ease forwards;
}
@keyframes flashFade{to{opacity:0;}}

/* ── WARP JUMP EFFECT ── */
#warpOverlay {
  position:fixed;inset:0;z-index:150;
  background:radial-gradient(ellipse at center,rgba(255,255,255,0.95) 0%,rgba(0,100,255,0.6) 30%,transparent 70%);
  opacity:0;pointer-events:none;transition:opacity 0.1s;
}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>
<canvas id="nebulaCanvas"></canvas>
<canvas id="warpCanvas"></canvas>
<canvas id="fxCanvas"></canvas>
<div id="warpOverlay"></div>

<header>
  <h1>✦ NOVA SCOREBOARD ✦</h1>
  <div class="subtitle">DEEP SPACE COMPETITION SYSTEM</div>
</header>

<div id="controlPanel">
  <div class="panel-title">⬡ Mission Configuration</div>
  <div class="controls-grid">
    <div class="ctrl-group">
      <label>Mode</label>
      <select id="mode">
        <option value="score">Score to Win</option>
        <option value="time">Timed Game</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Target Score / Seconds</label>
      <input type="number" id="targetValue" placeholder="e.g. 10 or 60" value="10">
    </div>
    <div class="ctrl-group">
      <label>Player Name</label>
      <input type="text" id="playerNameInput" placeholder="Call sign...">
    </div>
    <div class="ctrl-group">
      <label>Ship Color</label>
      <input type="color" id="playerColor" value="#00e5ff">
    </div>
    <div class="ctrl-group">
      <label>Ship Shape</label>
      <select id="shipShape" onchange="updateShipPreview()">
        <option value="classic">🚀 Classic Rocket</option>
        <option value="delta">△ Delta Wing</option>
        <option value="needle">| Needle</option>
        <option value="disc">◯ UFO Disc</option>
        <option value="viper">⚡ Viper</option>
        <option value="cruiser">⬡ Battle Cruiser</option>
        <option value="arrow">➤ Arrowhead</option>
        <option value="stealth">▽ Stealth</option>
        <option value="twin">✦ Twin Engine</option>
        <option value="ion">◈ Ion Lance</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Engine Trail</label>
      <select id="trailStyle">
        <option value="fire">🔥 Fire</option>
        <option value="plasma">💜 Plasma</option>
        <option value="ice">❄️ Ice</option>
        <option value="rainbow">🌈 Rainbow</option>
        <option value="ghost">👻 Ghost</option>
      </select>
    </div>
    <div class="ctrl-group">
      <label>Ship Size</label>
      <select id="shipSize">
        <option value="normal">Normal</option>
        <option value="large">Large</option>
        <option value="small">Small</option>
      </select>
    </div>
    <div class="ctrl-group" style="align-items:center">
      <label>Preview</label>
      <div id="shipPreviewWrap"></div>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <button class="btn btn-primary" onclick="addPlayer()">＋ Add Pilot</button>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <button class="btn btn-start" onclick="startGame()">▶ Launch</button>
    </div>
    <div class="ctrl-group" style="justify-content:flex-end">
      <button class="btn btn-end" onclick="endGame()">■ End Game</button>
    </div>
  </div>

  <!-- BACKGROUND SECTION -->
  <div style="display:flex;gap:14px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,229,255,0.1);flex-wrap:wrap;">
    <span class="panel-title" style="margin:0">⬡ Background</span>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:0.72em;letter-spacing:0.15em;color:rgba(255,255,255,0.5);text-transform:uppercase">Scene</label>
      <select id="bgScene" onchange="setBgScene(this.value)" style="padding:7px 10px;font-size:0.85em;width:auto">
        <option value="deep">Deep Space</option>
        <option value="nebula">Nebula Cloud</option>
        <option value="wormhole">Wormhole</option>
        <option value="aurora">Cosmic Aurora</option>
        <option value="storm">Ion Storm</option>
        <option value="galaxy">Galaxy Core</option>
      </select>
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:0.72em;letter-spacing:0.15em;color:rgba(255,255,255,0.5);text-transform:uppercase">Star Density</label>
      <input type="range" id="starDensity" min="50" max="600" value="280" oninput="setStarDensity(this.value)" style="width:80px;accent-color:var(--accent);cursor:pointer">
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:0.72em;letter-spacing:0.15em;color:rgba(255,255,255,0.5);text-transform:uppercase">Warp Speed</label>
      <input type="range" id="warpSpeed" min="0" max="10" value="3" oninput="setWarpSpeed(this.value)" style="width:80px;accent-color:var(--accent2);cursor:pointer">
    </div>
    <button class="btn btn-primary" onclick="triggerWarpJump()" style="padding:7px 14px;font-size:0.65em">⚡ WARP JUMP</button>
  </div>

  <!-- AUDIO SECTION -->
  <div style="display:flex;gap:14px;align-items:center;margin-top:14px;padding-top:14px;border-top:1px solid rgba(0,229,255,0.1);flex-wrap:wrap;">
    <span class="panel-title" style="margin:0">⬡ Audio</span>
    <button class="btn btn-primary" id="musicToggle" onclick="toggleMusic()" style="padding:7px 14px;font-size:0.65em">♫ MUSIC: ON</button>
    <button class="btn btn-primary" id="sfxToggle" onclick="toggleSfx()" style="padding:7px 14px;font-size:0.65em">🔊 SFX: ON</button>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:0.72em;letter-spacing:0.15em;color:rgba(255,255,255,0.5);text-transform:uppercase">Music Vol</label>
      <input type="range" id="musicVol" min="0" max="100" value="30" oninput="setMusicVol(this.value)" style="width:90px;accent-color:var(--accent);cursor:pointer">
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:0.72em;letter-spacing:0.15em;color:rgba(255,255,255,0.5);text-transform:uppercase">SFX Vol</label>
      <input type="range" id="sfxVol" min="0" max="100" value="60" oninput="setSfxVol(this.value)" style="width:90px;accent-color:var(--accent2);cursor:pointer">
    </div>
    <div style="display:flex;align-items:center;gap:8px">
      <label style="font-size:0.72em;letter-spacing:0.15em;color:rgba(255,255,255,0.5);text-transform:uppercase">Track</label>
      <select id="trackSelect" onchange="changeTrack(this.value)" style="padding:7px 10px;font-size:0.85em;width:auto">
        <option value="ambient">🌌 Deep Space Ambient</option>
        <option value="pulse">⚡ Pulse Drive</option>
        <option value="tension">🔴 Tension Grid</option>
        <option value="epic">🎺 Epic Fanfare</option>
        <option value="retro">👾 Retro Chiptune</option>
        <option value="zen">☯ Zero-G Zen</option>
        <option value="battle">💥 Battle Station</option>
      </select>
    </div>
  </div>
</div>

<div id="statusBar">AWAITING LAUNCH</div>
<div id="gameArea"></div>

<div id="results">
  <div class="results-title" id="winnerText"></div>
  <div class="podium-wrap" id="podium"></div>
  <div class="results-scores" id="allScores"></div>
  <button class="btn btn-primary" onclick="location.reload()" style="margin-top:10px">↺ PLAY AGAIN</button>
</div>

<script>
/* ══════════════════════════════════════════════
   LAYER 1: STARFIELD
══════════════════════════════════════════════ */
const bgCanvas = document.getElementById('bgCanvas');
const bgCtx = bgCanvas.getContext('2d');
let stars = [];
let starCount = 280;
let currentBgScene = 'deep';

function initStars() {
  bgCanvas.width = window.innerWidth;
  bgCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < starCount; i++) {
    stars.push({
      x: Math.random() * bgCanvas.width,
      y: Math.random() * bgCanvas.height,
      r: Math.random() * 1.8 + 0.2,
      speed: Math.random() * 0.3 + 0.05,
      alpha: Math.random() * 0.8 + 0.2,
      twinkle: Math.random() * Math.PI * 2,
      twinkleSpeed: 0.008 + Math.random() * 0.02,
      hue: Math.random() < 0.1 ? `hsl(${Math.random()*60+180},80%,90%)` :
           Math.random() < 0.05 ? `hsl(${Math.random()*40+350},80%,90%)` : 'rgba(210,230,255,1)',
      pulse: Math.random() < 0.03, // bright pulsing stars
      pulsePhase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  bgCtx.clearRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Scene-based background gradient
  let grad;
  if (currentBgScene === 'deep') {
    grad = bgCtx.createRadialGradient(bgCanvas.width/2, bgCanvas.height/2, 0, bgCanvas.width/2, bgCanvas.height/2, bgCanvas.width*0.8);
    grad.addColorStop(0, '#030614'); grad.addColorStop(1, '#020309');
  } else if (currentBgScene === 'nebula') {
    grad = bgCtx.createRadialGradient(bgCanvas.width*0.4, bgCanvas.height*0.4, 0, bgCanvas.width*0.5, bgCanvas.height*0.5, bgCanvas.width*0.9);
    grad.addColorStop(0, '#0d0025'); grad.addColorStop(0.5, '#020015'); grad.addColorStop(1, '#000008');
  } else if (currentBgScene === 'aurora') {
    grad = bgCtx.createLinearGradient(0, 0, 0, bgCanvas.height);
    grad.addColorStop(0, '#000818'); grad.addColorStop(0.5, '#001408'); grad.addColorStop(1, '#0a0015');
  } else if (currentBgScene === 'wormhole') {
    grad = bgCtx.createRadialGradient(bgCanvas.width/2, bgCanvas.height/2, 0, bgCanvas.width/2, bgCanvas.height/2, bgCanvas.width*0.6);
    grad.addColorStop(0, '#100030'); grad.addColorStop(0.6, '#040010'); grad.addColorStop(1, '#020008');
  } else if (currentBgScene === 'storm') {
    grad = bgCtx.createLinearGradient(0, 0, bgCanvas.width, bgCanvas.height);
    grad.addColorStop(0, '#0a0005'); grad.addColorStop(0.5, '#020010'); grad.addColorStop(1, '#000a05');
  } else if (currentBgScene === 'galaxy') {
    grad = bgCtx.createRadialGradient(bgCanvas.width*0.6, bgCanvas.height*0.5, 0, bgCanvas.width*0.5, bgCanvas.height*0.5, bgCanvas.width);
    grad.addColorStop(0, '#1a0800'); grad.addColorStop(0.3, '#080012'); grad.addColorStop(1, '#02030a');
  }
  bgCtx.fillStyle = grad;
  bgCtx.fillRect(0, 0, bgCanvas.width, bgCanvas.height);

  // Stars
  for (const s of stars) {
    s.twinkle += s.twinkleSpeed;
    s.pulsePhase += 0.04;
    let a = s.alpha * (0.6 + 0.4 * Math.sin(s.twinkle));
    let r = s.r;
    if (s.pulse) {
      r = s.r * (1 + 0.8 * Math.abs(Math.sin(s.pulsePhase)));
      a = 0.8 + 0.2 * Math.abs(Math.sin(s.pulsePhase));
      // glow for pulsing stars
      bgCtx.shadowBlur = 12;
      bgCtx.shadowColor = s.hue;
    }
    bgCtx.beginPath();
    bgCtx.arc(s.x, s.y, r, 0, Math.PI * 2);
    bgCtx.fillStyle = s.hue.replace('1)', `${a})`).replace('rgba(', 'rgba(').replace(/hsl\(/, 'hsla(').replace(/\)$/, `,${a})`);
    bgCtx.globalAlpha = a;
    bgCtx.fillStyle = s.hue;
    bgCtx.fill();
    bgCtx.globalAlpha = 1;
    bgCtx.shadowBlur = 0;
    s.y += s.speed * warpSpeedMult;
    if (s.y > bgCanvas.height) { s.y = 0; s.x = Math.random() * bgCanvas.width; }
  }
}
initStars();
window.addEventListener('resize', () => { initStars(); resizeNebula(); resizeFx(); });

/* ══════════════════════════════════════════════
   LAYER 2: NEBULA / SCENE FX
══════════════════════════════════════════════ */
const nebulaCanvas = document.getElementById('nebulaCanvas');
const nCtx = nebulaCanvas.getContext('2d');
let nebulaTime = 0;
let nebulaNodes = [];

function resizeNebula() {
  nebulaCanvas.width = window.innerWidth;
  nebulaCanvas.height = window.innerHeight;
  generateNebulaNodes();
}

function generateNebulaNodes() {
  nebulaNodes = [];
  const count = 5;
  for (let i = 0; i < count; i++) {
    nebulaNodes.push({
      x: Math.random() * nebulaCanvas.width,
      y: Math.random() * nebulaCanvas.height,
      rx: 120 + Math.random() * 300,
      ry: 80 + Math.random() * 200,
      angle: Math.random() * Math.PI * 2,
      speed: (Math.random() - 0.5) * 0.002,
      hue: Math.floor(Math.random() * 360),
      sat: 60 + Math.random() * 30,
      alpha: 0.06 + Math.random() * 0.1,
    });
  }
}
resizeNebula();

function drawNebula(t) {
  nCtx.clearRect(0, 0, nebulaCanvas.width, nebulaCanvas.height);
  nebulaTime += 0.003;

  if (currentBgScene === 'deep') {
    // Subtle distant galaxy wisps
    for (const n of nebulaNodes) {
      n.angle += n.speed;
      nCtx.save();
      nCtx.translate(n.x, n.y);
      nCtx.rotate(n.angle);
      const g = nCtx.createRadialGradient(0, 0, 0, 0, 0, n.rx);
      g.addColorStop(0, `hsla(${n.hue},${n.sat}%,60%,${n.alpha * 0.4})`);
      g.addColorStop(0.5, `hsla(${n.hue+30},${n.sat}%,50%,${n.alpha * 0.2})`);
      g.addColorStop(1, 'transparent');
      nCtx.scale(1, n.ry / n.rx);
      nCtx.beginPath(); nCtx.arc(0, 0, n.rx, 0, Math.PI * 2);
      nCtx.fillStyle = g; nCtx.fill();
      nCtx.restore();
    }
  } else if (currentBgScene === 'nebula') {
    // Rich colorful nebula
    const colors = [[280,80],[200,90],[340,70],[160,60]];
    colors.forEach(([hue, sat], ci) => {
      const cx = nebulaCanvas.width * (0.2 + ci * 0.22 + 0.05 * Math.sin(nebulaTime + ci));
      const cy = nebulaCanvas.height * (0.3 + ci * 0.15 + 0.04 * Math.cos(nebulaTime * 0.7 + ci));
      const r = 180 + 60 * Math.sin(nebulaTime * 0.5 + ci);
      const g = nCtx.createRadialGradient(cx, cy, 0, cx, cy, r);
      g.addColorStop(0, `hsla(${hue},${sat}%,55%,0.18)`);
      g.addColorStop(0.4, `hsla(${hue+20},${sat-10}%,45%,0.10)`);
      g.addColorStop(1, 'transparent');
      nCtx.beginPath(); nCtx.arc(cx, cy, r, 0, Math.PI*2);
      nCtx.fillStyle = g; nCtx.fill();
    });
    // Dust lanes
    nCtx.save();
    const dustG = nCtx.createLinearGradient(0, nebulaCanvas.height*0.3, nebulaCanvas.width, nebulaCanvas.height*0.7);
    dustG.addColorStop(0, 'transparent');
    dustG.addColorStop(0.3, 'rgba(80,20,120,0.06)');
    dustG.addColorStop(0.7, 'rgba(20,80,120,0.06)');
    dustG.addColorStop(1, 'transparent');
    nCtx.fillStyle = dustG; nCtx.fillRect(0, 0, nebulaCanvas.width, nebulaCanvas.height);
    nCtx.restore();
  } else if (currentBgScene === 'aurora') {
    // Northern lights curtains
    for (let band = 0; band < 4; band++) {
      const hue = [160, 200, 280, 120][band];
      const yBase = nebulaCanvas.height * [0.1, 0.2, 0.15, 0.25][band];
      const path = new Path2D();
      path.moveTo(0, yBase);
      const pts = 20;
      for (let i = 0; i <= pts; i++) {
        const x = (i / pts) * nebulaCanvas.width;
        const y = yBase + 80 * Math.sin(i * 0.5 + nebulaTime * (0.4 + band * 0.1) + band);
        i === 0 ? path.moveTo(x, y) : path.lineTo(x, y);
      }
      for (let i = pts; i >= 0; i--) {
        const x = (i / pts) * nebulaCanvas.width;
        const y = yBase + 200 + 60 * Math.sin(i * 0.4 + nebulaTime * (0.3 + band * 0.15) + band + 1);
        path.lineTo(x, y);
      }
      path.closePath();
      const g = nCtx.createLinearGradient(0, yBase, 0, yBase + 220);
      g.addColorStop(0, `hsla(${hue},80%,60%,0.0)`);
      g.addColorStop(0.3, `hsla(${hue},80%,60%,0.15)`);
      g.addColorStop(0.7, `hsla(${hue+30},70%,55%,0.10)`);
      g.addColorStop(1, 'transparent');
      nCtx.fillStyle = g; nCtx.fill(path);
    }
  } else if (currentBgScene === 'wormhole') {
    // Swirling vortex
    const cx = nebulaCanvas.width / 2, cy = nebulaCanvas.height / 2;
    for (let ring = 8; ring >= 0; ring--) {
      const r = (ring + 1) * 60 + 20 * Math.sin(nebulaTime * 2 + ring);
      const hue = (ring * 40 + nebulaTime * 30) % 360;
      nCtx.save();
      nCtx.translate(cx, cy);
      nCtx.rotate(nebulaTime * (0.2 + ring * 0.03));
      const g = nCtx.createRadialGradient(0, 0, r * 0.7, 0, 0, r);
      g.addColorStop(0, `hsla(${hue},80%,60%,0.0)`);
      g.addColorStop(0.5, `hsla(${hue},80%,60%,${0.06 + ring * 0.005})`);
      g.addColorStop(1, 'transparent');
      nCtx.beginPath(); nCtx.arc(0, 0, r, 0, Math.PI*2);
      nCtx.fillStyle = g; nCtx.fill();
      nCtx.restore();
    }
    // Central glow
    const cg = nCtx.createRadialGradient(cx, cy, 0, cx, cy, 100);
    cg.addColorStop(0, `rgba(180,100,255,${0.25 + 0.1 * Math.sin(nebulaTime * 3)})`);
    cg.addColorStop(0.5, 'rgba(80,0,200,0.08)');
    cg.addColorStop(1, 'transparent');
    nCtx.beginPath(); nCtx.arc(cx, cy, 100, 0, Math.PI*2);
    nCtx.fillStyle = cg; nCtx.fill();
  } else if (currentBgScene === 'storm') {
    // Ion storm — crackling energy
    for (let bolt = 0; bolt < 3; bolt++) {
      if (Math.random() < 0.04) {
        const sx = Math.random() * nebulaCanvas.width;
        const sy = 0;
        nCtx.save();
        nCtx.strokeStyle = `hsla(${200 + bolt*40},90%,80%,${0.15 + Math.random()*0.1})`;
        nCtx.lineWidth = 1;
        nCtx.shadowBlur = 12; nCtx.shadowColor = '#80ffff';
        nCtx.beginPath(); nCtx.moveTo(sx, sy);
        let cx2 = sx, cy2 = sy;
        while (cy2 < nebulaCanvas.height) {
          cx2 += (Math.random()-0.5)*60;
          cy2 += 30 + Math.random()*40;
          nCtx.lineTo(cx2, cy2);
        }
        nCtx.stroke();
        nCtx.restore();
      }
    }
    // Turbulent energy fields
    for (let ef = 0; ef < 2; ef++) {
      const ex = nebulaCanvas.width * (ef * 0.6 + 0.1 * Math.sin(nebulaTime + ef));
      const ey = nebulaCanvas.height * (0.3 + ef * 0.3);
      const g = nCtx.createRadialGradient(ex, ey, 0, ex, ey, 250 + 50*Math.sin(nebulaTime*2+ef));
      g.addColorStop(0, `hsla(${180+ef*60},90%,70%,0.08)`);
      g.addColorStop(0.5, `hsla(${220+ef*40},80%,60%,0.04)`);
      g.addColorStop(1, 'transparent');
      nCtx.beginPath(); nCtx.arc(ex, ey, 300, 0, Math.PI*2);
      nCtx.fillStyle = g; nCtx.fill();
    }
  } else if (currentBgScene === 'galaxy') {
    // Spiral galaxy arms
    const cx3 = nebulaCanvas.width * 0.55, cy3 = nebulaCanvas.height * 0.45;
    for (let arm = 0; arm < 2; arm++) {
      for (let i = 0; i < 200; i++) {
        const angle = (i / 200) * Math.PI * 4 + arm * Math.PI + nebulaTime * 0.05;
        const r = i * 1.4 + 20;
        const x = cx3 + r * Math.cos(angle) + (Math.random()-0.5)*20;
        const y = cy3 + r * 0.4 * Math.sin(angle) + (Math.random()-0.5)*10;
        const alpha = 0.02 + 0.04 * Math.exp(-i/120);
        const hue2 = 20 + i*0.3;
        nCtx.beginPath(); nCtx.arc(x, y, 1 + Math.random()*1.5, 0, Math.PI*2);
        nCtx.fillStyle = `hsla(${hue2},60%,80%,${alpha})`;
        nCtx.fill();
      }
    }
    // Core glow
    const cg2 = nCtx.createRadialGradient(cx3, cy3, 0, cx3, cy3, 120);
    cg2.addColorStop(0, 'rgba(255,200,100,0.25)');
    cg2.addColorStop(0.4, 'rgba(255,150,50,0.08)');
    cg2.addColorStop(1, 'transparent');
    nCtx.beginPath(); nCtx.arc(cx3, cy3, 120, 0, Math.PI*2);
    nCtx.fillStyle = cg2; nCtx.fill();
  }
}

/* ══════════════════════════════════════════════
   LAYER 3: WARP LINES
══════════════════════════════════════════════ */
const warpCanvas = document.getElementById('warpCanvas');
const wCtx = warpCanvas.getContext('2d');
let warpLines = [];
let warpSpeedMult = 0.6;

function resizeWarp() {
  warpCanvas.width = window.innerWidth;
  warpCanvas.height = window.innerHeight;
}
resizeWarp();

function initWarpLines() {
  warpLines = [];
  for (let i = 0; i < 60; i++) {
    warpLines.push({
      x: Math.random() * warpCanvas.width,
      y: Math.random() * warpCanvas.height,
      speed: 0.5 + Math.random() * 2,
      len: 0,
      alpha: 0,
      hue: Math.random() < 0.7 ? 190 : Math.random() < 0.5 ? 280 : 40,
    });
  }
}
initWarpLines();

function drawWarpLines() {
  wCtx.clearRect(0, 0, warpCanvas.width, warpCanvas.height);
  if (warpSpeedMult < 0.5) return;
  const cx = warpCanvas.width / 2, cy = warpCanvas.height / 2;
  for (const l of warpLines) {
    l.len = Math.min(l.len + l.speed * warpSpeedMult * 1.5, 60 * warpSpeedMult);
    l.alpha = Math.min(l.alpha + 0.02, (warpSpeedMult / 10) * 0.7);
    const dx = l.x - cx, dy = l.y - cy;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    const nx = dx / dist, ny = dy / dist;
    l.x += nx * l.speed * warpSpeedMult;
    l.y += ny * l.speed * warpSpeedMult;
    const x2 = l.x + nx * l.len;
    const y2 = l.y + ny * l.len;
    const g = wCtx.createLinearGradient(l.x, l.y, x2, y2);
    g.addColorStop(0, `hsla(${l.hue},90%,80%,0)`);
    g.addColorStop(1, `hsla(${l.hue},90%,80%,${l.alpha})`);
    wCtx.beginPath();
    wCtx.moveTo(l.x, l.y); wCtx.lineTo(x2, y2);
    wCtx.strokeStyle = g;
    wCtx.lineWidth = 1 + warpSpeedMult * 0.3;
    wCtx.stroke();
    if (l.x < -50 || l.x > warpCanvas.width + 50 || l.y < -50 || l.y > warpCanvas.height + 50) {
      l.x = cx + (Math.random() - 0.5) * 60;
      l.y = cy + (Math.random() - 0.5) * 60;
      l.len = 0; l.alpha = 0;
    }
  }
}

/* ══════════════════════════════════════════════
   MAIN RENDER LOOP
══════════════════════════════════════════════ */
function mainLoop(t) {
  drawStars(t);
  drawNebula(t);
  drawWarpLines();
  animateFx();

requestAnimationFrame(mainLoop);

/* ══════════════════════════════════════════════
   FX CANVAS
══════════════════════════════════════════════ */
const fxCanvas = document.getElementById('fxCanvas');
const fx = fxCanvas.getContext('2d');
let fxObjects = [];
function resizeFx() { fxCanvas.width = window.innerWidth; fxCanvas.height = window.innerHeight; }
resizeFx();

function animateFx() {
  fx.clearRect(0, 0, fxCanvas.width, fxCanvas.height);
  fxObjects = fxObjects.filter(o => o.alive);
  for (const o of fxObjects) o.update();
}

/* ── Asteroid ── */
class Asteroid {
  constructor(targetEl, onHit) {
    this.alive = true; this.onHit = onHit;
    const rect = targetEl.getBoundingClientRect();
    this.tx = rect.left + rect.width / 2; this.ty = rect.top + rect.height / 2;
    const edge = Math.random();
    if (edge < 0.5) { this.x = edge < 0.25 ? -80 : fxCanvas.width + 80; this.y = Math.random() * fxCanvas.height; }
    else { this.x = Math.random() * fxCanvas.width; this.y = edge < 0.75 ? -80 : fxCanvas.height + 80; }
    const dx = this.tx - this.x, dy = this.ty - this.y;
    const dist = Math.sqrt(dx*dx+dy*dy);
    const spd = 5 + Math.random() * 3;
    this.vx = dx/dist*spd; this.vy = dy/dist*spd;
    this.r = 22 + Math.random() * 12; this.rot = Math.random() * Math.PI * 2;
    this.rotSpd = (Math.random() - 0.5) * 0.08;
    this.points = this.genPoints(); this.hit = false;
    this.color = `hsl(${20 + Math.random()*30},60%,45%)`;
  }
  genPoints() {
    const pts = []; const n = 9 + Math.floor(Math.random() * 4);
    for (let i = 0; i < n; i++) {
      const a = (i/n)*Math.PI*2; const r = this.r * (0.65 + Math.random() * 0.4);
      pts.push([Math.cos(a)*r, Math.sin(a)*r]);
    } return pts;
  }
  update() {
    if (this.hit) return;
    this.x += this.vx; this.y += this.vy; this.rot += this.rotSpd;
    const dx = this.tx - this.x, dy = this.ty - this.y;
    if (Math.sqrt(dx*dx+dy*dy) < this.r + 20) {
      this.hit = true; this.alive = false; this.onHit();
      spawnExplosion(this.x, this.y, this.color); flashScreen();
    }
    this.draw();
  }
  draw() {
    fx.save(); fx.translate(this.x, this.y); fx.rotate(this.rot);
    fx.shadowBlur = 16; fx.shadowColor = 'rgba(255,120,30,0.7)';
    fx.beginPath();
    this.points.forEach(([px,py],i) => i ? fx.lineTo(px,py) : fx.moveTo(px,py));
    fx.closePath();
    const grad = fx.createRadialGradient(0,0,0,0,0,this.r);
    grad.addColorStop(0,'#fff3cc'); grad.addColorStop(0.4,this.color); grad.addColorStop(1,'#2a1200');
    fx.fillStyle = grad; fx.fill();
    fx.strokeStyle='rgba(255,200,100,0.4)'; fx.lineWidth=1.5; fx.stroke();
    fx.shadowBlur=0;
    for(let i=0;i<3;i++){fx.beginPath();fx.arc((i-1)*this.r*0.3,(i*0.2-0.2)*this.r*0.5,this.r*0.12,0,Math.PI*2);fx.fillStyle='rgba(0,0,0,0.3)';fx.fill();}
    fx.restore();
  }
}

function spawnExplosion(x,y,color) {
  for(let i=0;i<50;i++) fxObjects.push(new Particle(x,y,color,'explosion'));
  for(let i=0;i<8;i++) fxObjects.push(new Particle(x,y,'#fff','debris'));
}
function spawnBoost(x,y,color,trail) {
  const t = trail || 'fire';
  for(let i=0;i<24;i++) fxObjects.push(new Particle(x,y,color,'boost',t));
}

const TRAIL_COLORS = {
  fire:    ['#ff4400','#ff8800','#ffee00','#ff2200'],
  plasma:  ['#cc00ff','#ff00cc','#8800ff','#ff66ff'],
  ice:     ['#00ddff','#aaeeff','#ffffff','#0099cc'],
  rainbow: null,
  ghost:   ['rgba(200,255,200,0.7)','rgba(150,255,200,0.5)','rgba(200,200,255,0.6)']
};

class Particle {
  constructor(x,y,color,type,trail) {
    this.alive=true; this.x=x; this.y=y; this.type=type;
    const a=Math.random()*Math.PI*2;
    const trailColors = TRAIL_COLORS[trail];
    if(trail==='rainbow') this.color=`hsl(${Math.random()*360},90%,70%)`;
    else if(trailColors) this.color=trailColors[Math.floor(Math.random()*trailColors.length)];
    else this.color=color;
    if(type==='explosion'){const spd=2+Math.random()*6;this.vx=Math.cos(a)*spd;this.vy=Math.sin(a)*spd;this.r=2+Math.random()*4;this.life=1.0;this.decay=0.025+Math.random()*0.025;}
    else if(type==='debris'){const spd=3+Math.random()*8;this.vx=Math.cos(a)*spd;this.vy=Math.sin(a)*spd;this.r=3+Math.random()*5;this.life=1.0;this.decay=0.018+Math.random()*0.015;}
    else{const spd=1+Math.random()*3;this.vx=Math.cos(a)*spd;this.vy=-Math.abs(Math.sin(a))*spd-1;this.r=1.5+Math.random()*3;this.life=1.0;this.decay=0.03+Math.random()*0.02;}
  }
  update(){
    this.x+=this.vx; this.y+=this.vy; this.vy+=0.1; this.life-=this.decay;
    if(this.life<=0){this.alive=false;return;}
    fx.beginPath(); fx.arc(this.x,this.y,this.r*this.life,0,Math.PI*2);
    if(this.type==='explosion') fx.fillStyle=`rgba(255,${Math.floor(this.life*180)},0,${this.life})`;
    else if(this.type==='debris') fx.fillStyle=`rgba(255,240,200,${this.life})`;
    else fx.fillStyle=this.color;
    fx.shadowBlur=6; fx.shadowColor=this.color;
    fx.globalAlpha=this.life; fx.fill(); fx.globalAlpha=1; fx.shadowBlur=0;
  }
}

class Meteor {
  constructor() {
    this.alive=true;
    this.x=fxCanvas.width+80; this.y=Math.random()*fxCanvas.height*0.6;
    this.vx=-(4+Math.random()*5); this.vy=(2+Math.random()*3);
    this.len=60+Math.random()*80; this.life=1.0; this.decay=0.008+Math.random()*0.008;
  }
  update(){
    this.x+=this.vx; this.y+=this.vy; this.life-=this.decay;
    if(this.life<=0||this.x<-200||this.y>fxCanvas.height+100){this.alive=false;return;}
    fx.save();
    const angle=Math.atan2(this.vy,this.vx);
    fx.translate(this.x,this.y); fx.rotate(angle);
    const g=fx.createLinearGradient(0,0,-this.len,0);
    g.addColorStop(0,`rgba(255,255,240,${this.life})`);
    g.addColorStop(0.3,`rgba(255,180,60,${this.life*0.7})`);
    g.addColorStop(1,'transparent');
    fx.strokeStyle=g; fx.lineWidth=2*this.life;
    fx.shadowBlur=8*this.life; fx.shadowColor='rgba(255,200,80,0.8)';
    fx.beginPath(); fx.moveTo(0,0); fx.lineTo(-this.len,0); fx.stroke();
    fx.restore();
  }
}

function flashScreen(){
  const el=document.createElement('div');el.className='asteroid-flash';
  document.body.appendChild(el);setTimeout(()=>el.remove(),500);
}

/* ══════════════════════════════════════════════
   GAME STATE
══════════════════════════════════════════════ */
let players=[]; let gameStarted=false;
let meteorSpawnInterval=null; let timerInterval=null; let timeLeft=0;

function updateShipPreview() {
  const wrap = document.getElementById('shipPreviewWrap');
  const color = document.getElementById('playerColor').value;
  const shape = document.getElementById('shipShape').value;
  wrap.innerHTML = buildRocketSVG(color, shape, 'small');
}
document.getElementById('playerColor').addEventListener('input', updateShipPreview);
updateShipPreview();

function addPlayer() {
  const nameEl=document.getElementById('playerNameInput');
  const colorEl=document.getElementById('playerColor');
  const shapeEl=document.getElementById('shipShape');
  const trailEl=document.getElementById('trailStyle');
  const sizeEl=document.getElementById('shipSize');
  const name=nameEl.value.trim();
  if(!name){toast('Enter a pilot name!');return;}
  if(players.length>=8){toast('Max 8 pilots!');return;}
  players.push({name, score:0, color:colorEl.value, shape:shapeEl.value, trail:trailEl.value, size:sizeEl.value});
  nameEl.value=''; renderPlayers(); toast(`${name} joined the mission`);
}

function renderPlayers(){
  const area=document.getElementById('gameArea'); area.innerHTML='';
  const maxScore=Math.max(...players.map(p=>p.score),0);
  players.forEach((p,i)=>{
    const col=document.createElement('div');
    col.className='playerColumn'; col.id=`col${i}`;
    const rank=[...players].sort((a,b)=>b.score-a.score).findIndex(x=>x===p)+1;
    const isLeading=p.score===maxScore&&p.score>0&&players.length>1;
    const rankLabels=['1ST','2ND','3RD','4TH','5TH','6TH','7TH','8TH'];
    col.innerHTML=`
      <div class="player-card${isLeading?' leading':''}" id="card${i}">
        <div class="player-name">${escHtml(p.name)}</div>
        <div class="player-score-display" style="color:${p.color}" id="scoreDisp${i}">${p.score}</div>
        <div class="player-rank">${rankLabels[rank-1]||''}</div>
      </div>
      <div class="track-wrapper">
        <div class="track" id="track${i}">
          <div class="track-fill" id="fill${i}" style="height:0%"></div>
          <div class="rocket-wrap" id="rocket${i}" style="bottom:10px">
            ${buildRocketSVG(p.color,p.shape,p.size)}
          </div>
        </div>
      </div>
      <div class="score-controls">
        <button class="btn btn-score btn-plus" onclick="changeScore(${i},1)">+</button>
        <button class="btn btn-score btn-minus" onclick="changeScore(${i},-1)">−</button>
      </div>
      <div class="custom-score-wrap">
        <input type="number" id="custom${i}" placeholder="±pts">
        <button class="btn btn-primary" onclick="applyCustom(${i})">SET</button>
        <button class="btn btn-danger" onclick="removePlayer(${i})">✕</button>
      </div>`;
    area.appendChild(col);
  });
  players.forEach((_,i)=>updateRocketVisual(i,false));
}

function lighten(hex){
  let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  r=Math.min(255,r+80);g=Math.min(255,g+80);b=Math.min(255,b+80);
  return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
}
function escHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function updateRocketVisual(i,animate=true){
  const p=players[i];
  const target=parseFloat(document.getElementById('targetValue').value)||10;
  let pct=Math.max(0,Math.min(p.score/target,1));
  const rocketEl=document.getElementById(`rocket${i}`);
  const fillEl=document.getElementById(`fill${i}`);
  const scoreEl=document.getElementById(`scoreDisp${i}`);
  const cardEl=document.getElementById(`card${i}`);
  if(!rocketEl||!fillEl||!scoreEl)return;
  const TRACK_HEIGHT=340;
  const bottomPx=10+pct*(TRACK_HEIGHT-80);
  if(!animate){rocketEl.style.transition='none';fillEl.style.transition='none';}
  else{rocketEl.style.transition='bottom 0.6s cubic-bezier(0.34,1.56,0.64,1)';fillEl.style.transition='height 0.6s cubic-bezier(0.34,1.56,0.64,1)';}
  rocketEl.style.bottom=bottomPx+'px';
  fillEl.style.height=(pct*100)+'%';
  fillEl.style.background=`linear-gradient(to top,${p.color}33,transparent)`;
  scoreEl.textContent=p.score;
  const maxScore=Math.max(...players.map(p=>p.score));
  if(cardEl){
    cardEl.className=p.score===maxScore&&p.score>0&&players.length>1?'player-card leading':'player-card';
  }
}

function changeScore(i,val){
  if(!gameStarted){toast('Hit LAUNCH first!');return;}
  players[i].score+=val;
  updateRocketVisual(i);
  if(val<0)launchAsteroid(i);
  else triggerBoostFx(i);
  checkWin(i);
}
function applyCustom(i){
  if(!gameStarted){toast('Hit LAUNCH first!');return;}
  const input=document.getElementById(`custom${i}`);
  const value=parseFloat(input.value);
  if(isNaN(value))return;
  players[i].score+=value;
  input.value='';
  updateRocketVisual(i);
  if(value<0)launchAsteroid(i);
  else triggerBoostFx(i);
  checkWin(i);
}
function triggerBoostFx(i){
  const rocket=document.getElementById(`rocket${i}`);
  if(!rocket)return;
  const rect=rocket.getBoundingClientRect();
  spawnBoost(rect.left+rect.width/2,rect.top+rect.height/2,players[i].color,players[i].trail);
}
function launchAsteroid(i){
  const rocketEl=document.getElementById(`rocket${i}`);
  if(!rocketEl)return;
  const ast=new Asteroid(rocketEl,()=>{
    rocketEl.classList.remove('shaking');
    void rocketEl.offsetWidth;
    rocketEl.classList.add('shaking');
    setTimeout(()=>rocketEl.classList.remove('shaking'),600);
    updateRocketVisual(i);
  });
  fxObjects.push(ast);
}
function checkWin(i){
  const mode=document.getElementById('mode').value;
  const target=parseFloat(document.getElementById('targetValue').value)||10;
  if(mode==='score'&&players[i].score>=target)endGame();
}
function removePlayer(i){players.splice(i,1);renderPlayers();}

function startGame(){
  if(players.length===0){toast('Add at least one pilot!');return;}
  gameStarted=true;
  document.getElementById('statusBar').innerHTML='MISSION IN PROGRESS';
  const mode=document.getElementById('mode').value;
  if(mode==='time'){
    timeLeft=parseInt(document.getElementById('targetValue').value)||30;
    updateTimerDisplay();
    timerInterval=setInterval(()=>{timeLeft--;updateTimerDisplay();if(timeLeft<=0)endGame();},1000);
  }
  meteorSpawnInterval=setInterval(()=>{if(Math.random()<0.5)fxObjects.push(new Meteor());},600);
  toast('Mission started! 🚀');
}
function updateTimerDisplay(){
  const m=Math.floor(timeLeft/60).toString().padStart(2,'0');
  const s=(timeLeft%60).toString().padStart(2,'0');
  document.getElementById('statusBar').innerHTML=
    `MISSION IN PROGRESS &nbsp;|&nbsp; <span id="timer">T−${m}:${s}</span>`;
}
function endGame(){
  clearInterval(meteorSpawnInterval);clearInterval(timerInterval);gameStarted=false;
  const sorted=[...players].sort((a,b)=>b.score-a.score);
  document.getElementById('winnerText').textContent=sorted.length?`🏆 ${sorted[0].name} Wins!`:'No Winner';
  const podium=document.getElementById('podium');podium.innerHTML='';
  const medal=['🥇','🥈','🥉'],cls=['gold','silver','bronze'];
  const order=sorted.length>=2?[1,0,2]:[0];
  order.forEach(rank=>{
    if(!sorted[rank])return;
    const step=document.createElement('div');
    step.className=`podium-step podium-${cls[rank]||'bronze'}`;
    step.innerHTML=`<div class="podium-name" style="color:white">${escHtml(sorted[rank].name)}</div>
      <div class="podium-block">
        <div class="podium-medal">${medal[rank]||'🎖️'}</div>
        <div class="podium-score-text">${sorted[rank].score} pts</div>
        <div class="podium-place">${['1ST','2ND','3RD'][rank]||''}</div>
      </div>`;
    podium.appendChild(step);
  });
  const allScores=document.getElementById('allScores');
  allScores.innerHTML=sorted.slice(3).map((p,i)=>`<div class="result-row">${i+4}. ${escHtml(p.name)} — ${p.score} pts</div>`).join('');
  document.getElementById('results').style.display='flex';
}

function toast(msg){
  const el=document.createElement('div');el.className='toast';el.textContent=msg;
  document.body.appendChild(el);setTimeout(()=>el.remove(),2200);
}
document.getElementById('playerNameInput').addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer();});

/* ══════════════════════════════════════════════
   AUDIO ENGINE
══════════════════════════════════════════════ */
let audioCtx=null,masterGain=null,musicGain=null,sfxGain=null;
let musicNodes=[],musicScheduled=false,musicEnabled=true,sfxEnabled=true;
let currentTrack='ambient',musicVolume=0.30,sfxVolume=0.60;

function getCtx(){
  if(!audioCtx){
    audioCtx=new(window.AudioContext||window.webkitAudioContext)();
    masterGain=audioCtx.createGain();masterGain.gain.value=1;masterGain.connect(audioCtx.destination);
    musicGain=audioCtx.createGain();musicGain.gain.value=musicVolume;musicGain.connect(masterGain);
    sfxGain=audioCtx.createGain();sfxGain.gain.value=sfxVolume;sfxGain.connect(masterGain);
  }
  if(audioCtx.state==='suspended')audioCtx.resume();
  return audioCtx;
}
function playTone(freq,type,dur,vol,attack=0.01,release=0.1){
  const ctx=getCtx();const osc=ctx.createOscillator();const env=ctx.createGain();
  osc.type=type;osc.frequency.setValueAtTime(freq,ctx.currentTime);
  env.gain.setValueAtTime(0,ctx.currentTime);
  env.gain.linearRampToValueAtTime(vol,ctx.currentTime+attack);
  env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
  osc.connect(env);env.connect(sfxGain);osc.start();osc.stop(ctx.currentTime+dur+release);
}
function makeNoise(dur,vol,lpFreq){
  const ctx=getCtx();const bufSize=ctx.sampleRate*dur;
  const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
  const data=buf.getChannelData(0);for(let i=0;i<bufSize;i++)data[i]=Math.random()*2-1;
  const src=ctx.createBufferSource();src.buffer=buf;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=lpFreq;
  const env=ctx.createGain();env.gain.setValueAtTime(vol,ctx.currentTime);
  env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+dur);
  src.connect(lp);lp.connect(env);env.connect(sfxGain);src.start();src.stop(ctx.currentTime+dur);
}

// SFX
function sfx_scoreUp(){if(!sfxEnabled)return;getCtx();
  playTone(440,'sine',0.18,0.4,0.01,0.15);
  setTimeout(()=>playTone(660,'sine',0.22,0.35,0.01,0.18),90);

function stopMusic(){musicNodes.forEach(n=>{try{n.stop?n.stop():null;}catch(e){}});musicNodes=[];musicScheduled=false;}
function startMusic(){
  if(!musicEnabled)return;stopMusic();getCtx();
  const tracks={ambient:playAmbient,pulse:playPulse,tension:playTension,epic:playEpic,retro:playRetro,zen:playZen,battle:playBattle};
  (tracks[currentTrack]||playAmbient)();musicScheduled=true;

function playAmbient(){
  const ctx=getCtx();
  function makeDrone(freq,detune,vol){
    const osc1=ctx.createOscillator(),osc2=ctx.createOscillator(),lfo=ctx.createOscillator();
    const lfoGain=ctx.createGain(),env=ctx.createGain(),lp=ctx.createBiquadFilter();
    osc1.type='sine';osc1.frequency.value=freq;osc2.type='sine';osc2.frequency.value=freq*1.005+detune;
    lfo.type='sine';lfo.frequency.value=0.08+Math.random()*0.05;lfoGain.gain.value=freq*0.008;
    lp.type='lowpass';lp.frequency.value=600;lp.Q.value=2;env.gain.value=vol;
    lfo.connect(lfoGain);lfoGain.connect(osc1.frequency);lfoGain.connect(osc2.frequency);
    osc1.connect(lp);osc2.connect(lp);lp.connect(env);env.connect(musicGain);
    osc1.start();osc2.start();lfo.start();musicNodes.push(osc1,osc2,lfo);
  }
  makeDrone(65.4,0,0.18);makeDrone(98,0.3,0.14);makeDrone(164.8,-0.2,0.10);makeDrone(246.9,0.1,0.07);
  const arpNotes=[261.6,329.6,392,493.9,392,329.6];let arpIdx=0;
  function scheduleArp(){
    if(!musicEnabled||currentTrack!=='ambient')return;
    const freq=arpNotes[arpIdx++%arpNotes.length];
    const osc=ctx.createOscillator(),env=ctx.createGain(),rev=ctx.createDelay(1.5),revGain=ctx.createGain();
    rev.delayTime.value=0.45;revGain.gain.value=0.28;osc.type='sine';osc.frequency.value=freq;
    env.gain.setValueAtTime(0,ctx.currentTime);env.gain.linearRampToValueAtTime(0.12,ctx.currentTime+0.05);
    env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+1.8);
    osc.connect(env);env.connect(musicGain);env.connect(rev);rev.connect(revGain);revGain.connect(musicGain);
    osc.start();osc.stop(ctx.currentTime+2);musicNodes.push(osc);
    setTimeout(scheduleArp,arpIdx%2===0?1800:2400);
  }
  setTimeout(scheduleArp,400);
  function schedBass(){
    if(!musicEnabled||currentTrack!=='ambient')return;
    const osc=ctx.createOscillator(),env=ctx.createGain();
    osc.type='sine';osc.frequency.value=32.7;
    env.gain.setValueAtTime(0.22,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+2.5);
    osc.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+2.6);musicNodes.push(osc);
    setTimeout(schedBass,3200);
  }
  setTimeout(schedBass,1000);
}

function playPulse(){
  const ctx=getCtx();const BPM=128;const beat=60/BPM;
  function kick(){if(!musicEnabled||currentTrack!=='pulse')return;
    const osc=ctx.createOscillator(),env=ctx.createGain();osc.type='sine';
    osc.frequency.setValueAtTime(180,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(30,ctx.currentTime+0.15);
    env.gain.setValueAtTime(0.7,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.3);
    osc.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+0.35);musicNodes.push(osc);}
  function hat(vol=0.06){if(!musicEnabled||currentTrack!=='pulse')return;
    const buf=ctx.createBuffer(1,ctx.sampleRate*0.04,ctx.sampleRate);const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    const src=ctx.createBufferSource();src.buffer=buf;
    const hp=ctx.createBiquadFilter();hp.type='highpass';hp.frequency.value=8000;
    const env=ctx.createGain();env.gain.setValueAtTime(vol,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.04);
    src.connect(hp);hp.connect(env);env.connect(musicGain);src.start();musicNodes.push(src);}
  const bassLine=[65.4,65.4,73.4,65.4,87.3,98,73.4,65.4];let bassIdx=0;
  function bass(){if(!musicEnabled||currentTrack!=='pulse')return;
    const f=bassLine[bassIdx++%bassLine.length];const osc=ctx.createOscillator(),lp=ctx.createBiquadFilter(),env=ctx.createGain();
    osc.type='square';osc.frequency.value=f;lp.type='lowpass';lp.frequency.value=400;
    env.gain.setValueAtTime(0.18,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+beat*0.9);
    osc.connect(lp);lp.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+beat);musicNodes.push(osc);}
  const leadNotes=[523,659,784,659,523,440,523,659];let leadIdx=0;
  function lead(){if(!musicEnabled||currentTrack!=='pulse')return;
    if(leadIdx%8===0){leadIdx++;return;}
    const f=leadNotes[leadIdx++%leadNotes.length];const osc=ctx.createOscillator(),env=ctx.createGain();
    osc.type='triangle';osc.frequency.value=f;
    env.gain.setValueAtTime(0.08,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+beat*0.5);
    osc.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+beat);musicNodes.push(osc);}
  let step=0;
  function seq(){if(!musicEnabled||currentTrack!=='pulse')return;
    const s=step%16;if([0,4,8,12].includes(s))kick();if(s%2===1)hat(0.05);if(s%4===0)hat(0.09);
    if(s%2===0)bass();if(s%2===1)lead();step++;setTimeout(seq,beat*500);}
  seq();

/* ── NEW: Zero-G Zen (meditative ambient) ── */
function playZen(){
  const ctx=getCtx();
  // Crystal bowl drones (pure sine harmonics)
  const freqs=[136.1,204.2,272.3,340.4,408.5];
  freqs.forEach((f,i)=>{
    const osc=ctx.createOscillator(),lfo=ctx.createOscillator(),lfoG=ctx.createGain(),env=ctx.createGain();
    osc.type='sine';osc.frequency.value=f;
    lfo.type='sine';lfo.frequency.value=0.05+i*0.015;lfoG.gain.value=f*0.003;
    lfo.connect(lfoG);lfoG.connect(osc.frequency);
    env.gain.value=0.12/(i+1);
    osc.connect(env);env.connect(musicGain);osc.start();lfo.start();musicNodes.push(osc,lfo);});
  // Bell tones
  const bellNotes=[528,432,396,484];let bIdx=0;
  function bell(){if(!musicEnabled||currentTrack!=='zen')return;
    const f=bellNotes[bIdx++%bellNotes.length];
    const osc=ctx.createOscillator(),env=ctx.createGain(),del=ctx.createDelay(2),delG=ctx.createGain();
    osc.type='sine';osc.frequency.value=f;del.delayTime.value=0.8;delG.gain.value=0.3;
    env.gain.setValueAtTime(0,ctx.currentTime);env.gain.linearRampToValueAtTime(0.15,ctx.currentTime+0.01);
    env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+4);
    osc.connect(env);env.connect(musicGain);env.connect(del);del.connect(delG);delG.connect(musicGain);
    osc.start();osc.stop(ctx.currentTime+4.5);musicNodes.push(osc);
    setTimeout(bell,3000+Math.random()*3000);}
  setTimeout(bell,500);
  // White noise pad (soft)
  const buf=ctx.createBuffer(1,ctx.sampleRate*4,ctx.sampleRate);const d=buf.getChannelData(0);
  for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.01;
  const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
  const lp=ctx.createBiquadFilter();lp.type='lowpass';lp.frequency.value=300;
  const env=ctx.createGain();env.gain.value=0.4;
  src.connect(lp);lp.connect(env);env.connect(musicGain);src.start();musicNodes.push(src);
}

/* ── NEW: Battle Station (fast combat) ── */
function playBattle(){
  const ctx=getCtx();const BPM=145;const beat=60/BPM;
  function kick(){if(!musicEnabled||currentTrack!=='battle')return;
    const osc=ctx.createOscillator(),env=ctx.createGain();osc.type='sine';
    osc.frequency.setValueAtTime(220,ctx.currentTime);osc.frequency.exponentialRampToValueAtTime(35,ctx.currentTime+0.12);
    env.gain.setValueAtTime(0.8,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.25);
    osc.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+0.3);musicNodes.push(osc);}
  function snare(){if(!musicEnabled||currentTrack!=='battle')return;makeNoise(0.1,0.25,6000);}
  function distBass(f){if(!musicEnabled||currentTrack!=='battle')return;
    const osc=ctx.createOscillator(),wave=ctx.createWaveShaper(),lp=ctx.createBiquadFilter(),env=ctx.createGain();
    osc.type='sawtooth';osc.frequency.value=f;
    const curve=new Float32Array(256);for(let i=0;i<256;i++){const x=i*2/256-1;curve[i]=x<0?-Math.pow(-x,0.5):Math.pow(x,0.5);}
    wave.curve=curve;lp.type='lowpass';lp.frequency.value=600;
    env.gain.setValueAtTime(0.15,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+beat*0.45);
    osc.connect(wave);wave.connect(lp);lp.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+beat*0.5);musicNodes.push(osc);}
  function glitch(){if(!musicEnabled||currentTrack!=='battle')return;
    if(Math.random()<0.15){const osc=ctx.createOscillator(),env=ctx.createGain();
      osc.type='square';osc.frequency.value=880+Math.random()*440;
      env.gain.setValueAtTime(0.05,ctx.currentTime);env.gain.exponentialRampToValueAtTime(0.0001,ctx.currentTime+0.04);
      osc.connect(env);env.connect(musicGain);osc.start();osc.stop(ctx.currentTime+0.05);musicNodes.push(osc);}}
  const bassRiff=[55,55,73.4,55,65.4,87.3,55,0];let riffIdx=0;
  let step=0;
  function seq(){if(!musicEnabled||currentTrack!=='battle')return;
    const s=step%16;
    if([0,4,6,8,12,14].includes(s))kick();
    if([4,12].includes(s))snare();
    if(s%2===0){const f=bassRiff[riffIdx++%bassRiff.length];if(f)distBass(f);}
    makeNoise(0.02,0.04,10000);glitch();
    step++;setTimeout(seq,beat*500);}
  seq();
}

const _origEndGame=endGame;window.endGame=function(){_origEndGame();stopMusic();setTimeout(sfx_victory,300);};
const _origChangeScore=changeScore;window.changeScore=function(i,val){_origChangeScore(i,val);if(val>0){sfx_scoreUp();sfx_rocketBoost();}else sfx_scoreDown();};
const _origApplyCustom=applyCustom;window.applyCustom=function(i){const v=parseFloat(document.getElementById(`custom${i}`).value);_origApplyCustom(i);if(!isNaN(v)){if(v>0){sfx_scoreUp();sfx_rocketBoost();}else if(v<0)sfx_scoreDown();}};
const _origAsteroidUpdate=Asteroid.prototype.update;Asteroid.prototype.update=function(){const wasHit=this.hit;_origAsteroidUpdate.call(this);if(!wasHit&&this.hit)sfx_asteroidImpact();};
const _origTimerDisplay=updateTimerDisplay;window.updateTimerDisplay=function(){_origTimerDisplay();if(timeLeft<=10&&timeLeft>0)sfx_timerWarn();else if(timeLeft>0)sfx_timerTick();};
document.addEventListener('click',e=>{if(e.target.matches('.btn')&&!e.target.matches('.btn-score'))sfx_buttonClick();});
document.addEventListener('click',()=>{if(!musicScheduled&&musicEnabled){startMusic();musicScheduled=true;}},{once:true});
</script>
</body>
</html>
